        };

        const explicit_spec = numeric_specs[path_key];
        if (explicit_spec) {
          return explicit_spec;
        }

        const magnitude = Math.max(1, Math.abs(value));
        return {
          min: value < 0 ? -magnitude * 2 : 0,
          max: magnitude * 2,
          step: magnitude >= 10 ? 1 : 0.01
        };
      }

      function get_slider_palette() {
        const styles = getComputedStyle(app_root);
        return {
          progress: styles.getPropertyValue("--vf-color-link-default").trim() || "#ffffff",
          empty: styles.getPropertyValue("--vf-color-border-default").trim() || "#4b4b4b"
        };
      }

      function render_slider_track(range_input) {
        if (!range_input) {
          return;
        }

        const min = Number(range_input.min || 0);
        const max = Number(range_input.max || 100);
        const value = Number(range_input.value || 0);
        const span = Math.max(0.0001, max - min);
        const fill_ratio = clamp((value - min) / span, 0, 1);
        const palette = get_slider_palette();

        range_input.style.accentColor = palette.progress;
        range_input.style.backgroundRepeat = "no-repeat";
        range_input.style.backgroundSize = "100% 100%";

        if (!is_webkit_slider_engine) {
          range_input.style.backgroundImage = "";
          return;
        }

        const fill_percent = (fill_ratio * 100).toFixed(3);
        range_input.style.backgroundImage =
          `linear-gradient(to right, ${palette.progress} 0%, ${palette.progress} ${fill_percent}%, ${palette.empty} ${fill_percent}%, ${palette.empty} 100%)`;
      }

      function refresh_slider_tracks() {
        for (const control of state.editor_controls.values()) {
          if (control.type === "number") {
            render_slider_track(control.range_input);
          }
        }
      }

      function sync_editor_values() {
        for (const [path_key, control] of state.editor_controls.entries()) {
          const value = get_config_value(path_key.split("."));
          if (control.type === "number") {
            control.range_input.value = String(clamp(value, Number(control.range_input.min), Number(control.range_input.max)));
            control.number_input.value = String(value);
            continue;
          }

          if (control.input.type === "checkbox") {
            control.input.checked = Boolean(value);
          } else {
            control.input.value = String(value);
          }
        }

        refresh_slider_tracks();
      }

      function update_preset_controls() {
        preset_delete_button.disabled = !state.active_preset_id;
      }

      function set_drawer_open(next_state) {
        const is_docked = is_local_editor && window.innerWidth >= DOCKED_EDITOR_MIN_WIDTH_PX;
        const is_open = is_docked ? true : next_state;

        state.drawer_is_open = is_open;
        document.body.classList.toggle("editor-docked", is_docked);
        document.body.classList.toggle("drawer-open", is_open);
        control_panel.classList.toggle("is-collapsed", !is_open);
        drawer_toggle_button.hidden = is_docked;
        drawer_backdrop.hidden = is_docked;
        drawer_close_button.hidden = is_docked;
        drawer_toggle_button.setAttribute("aria-expanded", String(is_open));
        drawer_toggle_button.textContent = is_open && !is_docked ? "Close" : "Controls";
      }

      function toggle_drawer() {
        set_drawer_open(!state.drawer_is_open);
      }

      function update_editor_panel_mode() {
        if (!is_local_editor) {
          return;
        }

        const is_docked = window.innerWidth >= DOCKED_EDITOR_MIN_WIDTH_PX;
        set_drawer_open(is_docked ? true : false);
      }

      function save_presets_to_storage() {
        try {
          collapse_state_presets();
          window.localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(state.presets));
          if (state.active_preset_id) {
            window.localStorage.setItem(ACTIVE_PRESET_STORAGE_KEY, state.active_preset_id);
          } else {
            window.localStorage.removeItem(ACTIVE_PRESET_STORAGE_KEY);
          }
        } catch (error) {
          console.error(error);
          set_preset_meta("Preset storage is not available in this browser.", true);
        }
      }

      function open_editor_storage_db() {
        return new Promise((resolve, reject) => {
          if (!("indexedDB" in window)) {
            resolve(null);
            return;
          }

          const request = window.indexedDB.open(EXPORT_DIRECTORY_DB_NAME, 1);
          request.addEventListener("upgradeneeded", () => {
            if (!request.result.objectStoreNames.contains(EXPORT_DIRECTORY_STORE_NAME)) {
              request.result.createObjectStore(EXPORT_DIRECTORY_STORE_NAME);
            }
          });
          request.addEventListener("success", () => {
            resolve(request.result);
          });
          request.addEventListener("error", () => {
            reject(request.error);
          });
        });
      }

      async function read_editor_storage_value(key) {
        const database = await open_editor_storage_db();
        if (!database) {
          return null;
        }

        return new Promise((resolve, reject) => {
          const transaction = database.transaction(EXPORT_DIRECTORY_STORE_NAME, "readonly");
          const store = transaction.objectStore(EXPORT_DIRECTORY_STORE_NAME);
          const request = store.get(key);
          request.addEventListener("success", () => {
            resolve(request.result ?? null);
          });
          request.addEventListener("error", () => {
            reject(request.error);
          });
          transaction.addEventListener("complete", () => {
            database.close();
          });
        });
      }

      async function write_editor_storage_value(key, value) {
        const database = await open_editor_storage_db();
        if (!database) {
          return;
        }

        return new Promise((resolve, reject) => {
          const transaction = database.transaction(EXPORT_DIRECTORY_STORE_NAME, "readwrite");
          const store = transaction.objectStore(EXPORT_DIRECTORY_STORE_NAME);
          const request = store.put(value, key);
          request.addEventListener("success", () => {
            resolve();
          });
          request.addEventListener("error", () => {
            reject(request.error);
          });
          transaction.addEventListener("complete", () => {
            database.close();
          });
        });
      }

      function is_abort_error(error) {
        return Boolean(error) && (
          error.name === "AbortError" ||
          error.code === 20
        );
      }

      async function ensure_directory_write_permission(directory_handle, request_if_needed = true) {
        if (!directory_handle) {
          return false;
        }

        if (typeof directory_handle.queryPermission !== "function") {
          return true;
        }

        const permission_options = { mode: "readwrite" };
        let permission_state = await directory_handle.queryPermission(permission_options);
        if (permission_state !== "granted" && request_if_needed && typeof directory_handle.requestPermission === "function") {
          permission_state = await directory_handle.requestPermission(permission_options);
        }

        return permission_state === "granted";
      }

      async function load_export_directory_handle() {
        try {
          const saved_handle = await read_editor_storage_value(EXPORT_DIRECTORY_KEY);
          return saved_handle && saved_handle.kind === "directory" ? saved_handle : null;
        } catch (error) {
          console.error(error);
          return null;
        }
      }

      async function persist_export_directory_handle(directory_handle) {
        try {
          await write_editor_storage_value(EXPORT_DIRECTORY_KEY, directory_handle);
        } catch (error) {
          console.error(error);
        }
      }

      async function get_export_directory_handle() {
        if (state.export_directory_handle) {
          const has_permission = await ensure_directory_write_permission(state.export_directory_handle, true);
          if (has_permission) {
            return state.export_directory_handle;
          }
          state.export_directory_handle = null;
        }

        const saved_handle = await load_export_directory_handle();
        if (!saved_handle) {
          return null;
        }

        const has_permission = await ensure_directory_write_permission(saved_handle, true);
        if (!has_permission) {
          return null;
        }

        state.export_directory_handle = saved_handle;
        return saved_handle;
      }

      async function request_export_directory_handle() {
        if (typeof window.showDirectoryPicker !== "function") {
          return null;
        }

        const directory_handle = await window.showDirectoryPicker({
          id: "radial-mascot-presets",
          mode: "readwrite",
          startIn: "documents"
        });
        const has_permission = await ensure_directory_write_permission(directory_handle, true);
        if (!has_permission) {
          return null;
        }

        state.export_directory_handle = directory_handle;
        await persist_export_directory_handle(directory_handle);
        return directory_handle;
      }

      async function write_json_file(file_handle, payload) {
        const writable = await file_handle.createWritable();
        await writable.write(JSON.stringify(payload, null, 2));
        await writable.close();
      }

      async function write_blob_file(file_handle, blob) {
        const writable = await file_handle.createWritable();
        await writable.write(blob);
        await writable.close();
      }

      function canvas_to_blob(type = "image/png") {
        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (blob) {
              resolve(blob);
              return;
            }

            reject(new Error("Canvas export failed."));
          }, type);
        });
      }

      async function get_sequence_output_directory_handle() {
        let directory_handle = await get_export_directory_handle();
        if (!directory_handle) {
          set_preset_meta("Choose the project folder or its output folder for PNG export.", false);
          directory_handle = await request_export_directory_handle();
        }

        if (!directory_handle) {
          return null;
        }

        if (directory_handle.name.toLowerCase() === "output") {
          return {
            directory_handle,
            output_path_label: directory_handle.name
          };
        }

        const output_directory_handle = await directory_handle.getDirectoryHandle("output", { create: true });
        return {
          directory_handle: output_directory_handle,
          output_path_label: `${directory_handle.name}/${output_directory_handle.name}`
        };
      }

      function normalize_preset_entry(entry, fallback_name) {
        if (!is_plain_object(entry)) {
          return null;
        }

        const snapshot_source = is_plain_object(entry.config) ? entry.config : entry;
        return {
          id: typeof entry.id === "string" && entry.id ? entry.id : create_preset_id(),
          name: typeof entry.name === "string" && entry.name.trim() ? entry.name.trim() : fallback_name,
          config: normalize_config_snapshot(snapshot_source)
        };
      }

      function get_preset_name_key(name) {
        return String(name || "").trim().toLowerCase();
      }

      function collapse_presets_by_name(presets) {
        const seen_name_keys = new Set();
        const collapsed_reversed = [];

        for (let index = presets.length - 1; index >= 0; index -= 1) {
          const preset = presets[index];
          const name_key = get_preset_name_key(preset.name);
          if (seen_name_keys.has(name_key)) {
            continue;
          }

          seen_name_keys.add(name_key);
          collapsed_reversed.push(preset);
        }

        return collapsed_reversed.reverse();
      }

      function find_preset_by_name(name, presets = state.presets) {
        const name_key = get_preset_name_key(name);

        for (let index = presets.length - 1; index >= 0; index -= 1) {
          const preset = presets[index];
          if (get_preset_name_key(preset.name) === name_key) {
            return preset;
          }
        }

        return null;
      }

      function sync_preset_ids_after_collapse(previous_presets) {
        const previous_active_name = previous_presets.find((preset) => preset.id === state.active_preset_id)?.name || null;
        const previous_selected_name = previous_presets.find((preset) => preset.id === state.selected_preset_id)?.name || null;

        if (!state.presets.some((preset) => preset.id === state.active_preset_id)) {
          state.active_preset_id = previous_active_name
            ? find_preset_by_name(previous_active_name, state.presets)?.id || null
            : null;
        }

        if (!state.presets.some((preset) => preset.id === state.selected_preset_id)) {
          state.selected_preset_id = previous_selected_name
            ? find_preset_by_name(previous_selected_name, state.presets)?.id || null
            : null;
        }

        if (!state.selected_preset_id) {
          state.selected_preset_id = state.active_preset_id || state.presets[0]?.id || null;
        }
      }

      function collapse_state_presets() {
        const previous_presets = state.presets.slice();
        state.presets = collapse_presets_by_name(previous_presets);
        sync_preset_ids_after_collapse(previous_presets);
      }

      function load_presets_from_storage() {
        state.presets = [];
        state.active_preset_id = null;
        state.selected_preset_id = null;

        try {
          const raw_presets = window.localStorage.getItem(PRESET_STORAGE_KEY);
          const parsed_presets = raw_presets ? JSON.parse(raw_presets) : [];
          let normalized_presets = [];
          if (Array.isArray(parsed_presets)) {
            normalized_presets = parsed_presets
              .map((entry, index) => normalize_preset_entry(entry, `Preset ${index + 1}`))
              .filter(Boolean);
          }

          state.presets = collapse_presets_by_name(normalized_presets);

          const saved_active_id = window.localStorage.getItem(ACTIVE_PRESET_STORAGE_KEY);
          if (saved_active_id && state.presets.some((preset) => preset.id === saved_active_id)) {
            state.active_preset_id = saved_active_id;
          } else if (saved_active_id) {
            const saved_active_preset = normalized_presets.find((preset) => preset.id === saved_active_id);
            state.active_preset_id = saved_active_preset
              ? find_preset_by_name(saved_active_preset.name, state.presets)?.id || null
              : null;
          }
          state.selected_preset_id = state.active_preset_id || state.presets[0]?.id || null;

          if (state.presets.length !== normalized_presets.length) {
            save_presets_to_storage();
          }
        } catch (error) {
          console.error(error);
          state.presets = [];
          state.active_preset_id = null;
          state.selected_preset_id = null;
          set_preset_meta("Saved presets could not be read. Storage was reset.", true);
        }
      }

      function render_preset_tabs() {
        preset_tabs.innerHTML = "";

        if (state.presets.length === 0) {
          const empty_state = document.createElement("p");
          empty_state.className = "p-form-help-text preset-empty";
          empty_state.textContent = "No saved presets yet.";
          preset_tabs.appendChild(empty_state);
          update_preset_controls();
          return;
        }

        const list = document.createElement("div");
        list.className = "preset-radio-list";
        list.setAttribute("role", "radiogroup");
        list.setAttribute("aria-label", "Saved presets");

        for (let index = 0; index < state.presets.length; index += 1) {
          const preset = state.presets[index];
          const row = document.createElement("label");
          row.className = "preset-radio-row";

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = "saved-preset";
          radio.value = preset.id;
          radio.checked = preset.id === state.selected_preset_id;
          radio.addEventListener("change", () => {
            state.selected_preset_id = preset.id;
            activate_selected_preset();
          });

          const name = document.createElement("span");
          name.className = "preset-radio-name";
          name.textContent = preset.name;

          row.appendChild(radio);
          row.appendChild(name);

          if (preset.id === state.active_preset_id) {
            const status = document.createElement("span");
            status.className = "preset-radio-status";
            status.textContent = "Active";
            row.appendChild(status);
          }

          list.appendChild(row);
        }

        preset_tabs.appendChild(list);
        update_preset_controls();
      }

      function create_control_input(path_key, value) {
        if (typeof value === "number") {
          const numeric_spec = get_numeric_control_spec(path_key, value);
          const field = document.createElement("div");
          field.className = "p-slider__wrapper control-composite";

          const range_input = document.createElement("input");
          range_input.type = "range";
          range_input.className = "u-no-margin--bottom";
          range_input.min = String(numeric_spec.min);
          range_input.max = String(numeric_spec.max);
          range_input.step = String(numeric_spec.step);
          range_input.value = String(clamp(value, numeric_spec.min, numeric_spec.max));
          range_input.dataset.configPath = path_key;
          range_input.addEventListener("input", handle_control_commit);
          range_input.addEventListener("change", handle_control_commit);

          const number_input = document.createElement("input");
          number_input.type = "number";
          number_input.className = "p-slider__input p-form-validation__input is-dense u-no-margin--bottom";
          number_input.step = "any";
          number_input.value = String(value);
          number_input.dataset.configPath = path_key;
          number_input.addEventListener("input", handle_control_commit);
          number_input.addEventListener("change", handle_control_commit);

          field.appendChild(range_input);
          field.appendChild(number_input);

          return {
            element: field,
            control: {
              type: "number",
              range_input,
              number_input
            }
          };
        }

        const input = document.createElement("input");
        input.dataset.configPath = path_key;

        if (typeof value === "boolean") {
          const checkbox = document.createElement("label");
          checkbox.className = "p-checkbox control-checkbox";

          input.type = "checkbox";
          input.className = "p-checkbox__input";
          input.checked = value;
          input.addEventListener("change", handle_control_commit);

          const label = document.createElement("span");
          label.className = "p-checkbox__label";
          label.textContent = humanize_key(path_key.split(".").pop());

          checkbox.appendChild(input);
          checkbox.appendChild(label);
          return {
            element: checkbox,
            control: {
              type: "single",
              input
            }
          };
        }

        if (is_hex_color_string(value)) {
          input.type = "color";
          input.className = "p-form-validation__input is-dense control-color u-no-margin--bottom";
          input.value = value;
          input.addEventListener("input", handle_control_commit);
          return {
            element: input,
            control: {
              type: "single",
              input
            }
          };
        }

        input.type = "text";
        input.className = "p-form-validation__input is-dense u-no-margin--bottom";
        input.value = value;
        input.addEventListener("change", handle_control_commit);
        return {
          element: input,
          control: {
            type: "single",
            input
          }
        };
      }

      function create_control_row(path_parts, value) {
        const path_key = path_parts.join(".");
        if (is_control_hidden(path_key)) {
          return null;
        }

        const help_text = get_control_help_text(path_key);
        const row = document.createElement("div");
        row.className = "p-form__group";

        if (typeof value === "boolean") {
          const input_bundle = create_control_input(path_key, value);
          state.editor_controls.set(path_key, input_bundle.control);
          const control = document.createElement("div");
          control.className = "p-form__control";
          control.appendChild(input_bundle.element);
          row.appendChild(control);
          if (help_text) {
            const help = document.createElement("p");
            help.className = "p-form-help-text control-help";
            help.textContent = help_text;
            row.appendChild(help);
          }
          return row;
        }

        const label = document.createElement("label");
        label.className = "p-form__label";
        label.htmlFor = `control-${path_key.replace(/\./g, "-")}`;
        label.textContent = get_control_label(path_key);

        const input_bundle = create_control_input(path_key, value);
        state.editor_controls.set(path_key, input_bundle.control);
        if (input_bundle.control.type === "number") {
          input_bundle.control.range_input.id = label.htmlFor;
          input_bundle.control.number_input.id = `${label.htmlFor}-value`;
        } else {
          input_bundle.control.input.id = label.htmlFor;
        }

        const control = document.createElement("div");
        control.className = "p-form__control";
        control.appendChild(input_bundle.element);

        row.appendChild(label);
        row.appendChild(control);
        if (help_text) {
          const help = document.createElement("p");
          help.className = "p-form-help-text control-help";
          help.textContent = help_text;
          row.appendChild(help);
        }
        return row;
      }

      function append_editor_fields(parent, object_value, path_parts) {
        let appended_count = 0;
        for (const [key, value] of Object.entries(object_value)) {
          const next_path = path_parts.concat(key);
          if (is_plain_object(value)) {
            const group = document.createElement("div");
            group.className = "config-group";

            const group_count = append_editor_fields(group, value, next_path);
            if (group_count === 0) {
              continue;
            }

            const title = document.createElement("h3");
            title.className = "p-text--small-caps u-no-margin--bottom";
            title.textContent = humanize_key(key);
            group.prepend(title);
            parent.appendChild(group);
            appended_count += group_count;
            continue;
          }

          const row = create_control_row(next_path, value);
          if (!row) {
            continue;
          }

          parent.appendChild(row);
          appended_count += 1;
        }

        return appended_count;
      }

      function build_config_editor() {
        config_editor.innerHTML = "";
        state.editor_controls = new Map();

        const tabs = document.createElement("div");
        tabs.className = "p-tabs config-tabs";

        const list = document.createElement("div");
        list.className = "p-tabs__list";
        list.setAttribute("role", "tablist");
        list.setAttribute("aria-label", "Animation settings");

        const panels = document.createElement("div");
        panels.className = "config-panels";

        for (const group of EDITOR_TAB_GROUPS) {
          const item = document.createElement("div");
          item.className = "p-tabs__item";

          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "p-tabs__link";
          tab.id = `editor-tab-${group.key}`;
          tab.dataset.editorTab = group.key;
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-controls", `editor-panel-${group.key}`);
          tab.textContent = group.label;
          tab.addEventListener("click", () => {
            set_active_editor_tab(group.key);
          });
          tab.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight") {
              event.preventDefault();
              focus_adjacent_editor_tab(group.key, 1);
            }

            if (event.key === "ArrowLeft") {
              event.preventDefault();
              focus_adjacent_editor_tab(group.key, -1);
            }
          });

          item.appendChild(tab);
          list.appendChild(item);

          const panel = document.createElement("section");
          panel.className = "config-panel";
          panel.id = `editor-panel-${group.key}`;
          panel.dataset.editorPanel = group.key;
          panel.setAttribute("role", "tabpanel");
          panel.setAttribute("tabindex", "0");
          panel.setAttribute("aria-labelledby", tab.id);

          const form = document.createElement("form");
          form.className = "p-form p-form--stacked editor-form";
          form.addEventListener("submit", (event) => {
            event.preventDefault();
          });

          if (group.key === "presets" && preset_panel) {
            preset_panel.hidden = false;
            panel.appendChild(preset_panel);
            panels.appendChild(panel);
            continue;
          }

          if (group.key === "mascot") {
            const section = document.createElement("div");
            section.className = "config-section";

            let mascot_field_count = 0;
            for (const path_parts of [
              ["mascot", "base_width_px"],
              ["mascot", "scale"],
              ["mascot", "opacity"]
            ]) {
              const row = create_control_row(path_parts, get_config_value(path_parts));
              if (!row) {
                continue;
              }
              section.appendChild(row);
              mascot_field_count += 1;
            }

            if (mascot_field_count === 0) {
              panels.appendChild(panel);
              continue;
            }

            const title = document.createElement("h2");
            title.className = "p-heading--5 u-no-margin--bottom";
            title.textContent = "Mascot";
            section.prepend(title);
            form.appendChild(section);
            panel.appendChild(form);
            panels.appendChild(panel);
            continue;
          }

          for (const section_key of group.sections) {
            const section_value = config[section_key];
            if (!is_plain_object(section_value)) {
              continue;
            }

            const section = document.createElement("div");
            section.className = "config-section";

            const field_count = append_editor_fields(section, section_value, [section_key]);
            if (field_count === 0) {
              continue;
            }

            const title = document.createElement("h2");
            title.className = "p-heading--5 u-no-margin--bottom";
            title.textContent = humanize_key(section_key);
            section.prepend(title);
            form.appendChild(section);
          }

          panel.appendChild(form);
          panels.appendChild(panel);
        }

        tabs.appendChild(list);
        config_editor.appendChild(tabs);
        config_editor.appendChild(panels);

        if (!EDITOR_TAB_GROUPS.some((group) => group.key === state.active_editor_tab_key)) {
          state.active_editor_tab_key = EDITOR_TAB_GROUPS[0]?.key || null;
        }

        if (state.active_editor_tab_key) {
          set_active_editor_tab(state.active_editor_tab_key);
        }

        refresh_slider_tracks();
      }

      function parse_control_value(input, current_value) {
        if (typeof current_value === "boolean") {
          return input.checked;
        }

        if (typeof current_value === "number") {
          if (input.value === "") {
            return undefined;
          }

          const next_value = Number(input.value);
          return Number.isFinite(next_value) ? next_value : undefined;
        }

        return input.value;
      }

      function get_current_playback_time_sec(now_ms = performance.now()) {
        if (state.animation_frame_id) {
          return clamp((now_ms - state.animation_start_ms) / 1000, 0, state.playback_end_sec);
        }

        return clamp(state.playback_time_sec, 0, state.playback_end_sec);
      }

      async function refresh_scene(options = {}) {
        const refresh_id = ++state.refresh_serial;
        const preserved_playback_time_sec = options.playback_time_sec ?? get_current_playback_time_sec();
        const restart_animation = options.restart_animation !== false;
        stop_animation();
        apply_stage_styles();

        if (!config.mascot.enabled) {
          state.mascot_face_image = null;
          state.mascot_halo_image = null;
          state.mascot_box = null;
        } else if (options.reload_mascot || !state.mascot_face_image || !state.mascot_halo_image) {
          await load_mascot_images();
          if (refresh_id !== state.refresh_serial) {
            return;
          }
        }

        resize_canvas(restart_animation ? 0 : preserved_playback_time_sec);

        if (restart_animation) {
          start_animation();
        }
      }

      async function handle_control_commit(event) {
        const input = event.currentTarget;
        const path_parts = input.dataset.configPath.split(".");
        const path_key = path_parts.join(".");
        const current_value = get_config_value(path_parts);
        const next_value = parse_control_value(input, current_value);

        if (typeof next_value === "undefined") {
          return;
        }

        if (next_value === current_value) {
          return;
        }

        set_config_value(path_parts, next_value);
        const control = state.editor_controls.get(path_key);
        if (control && control.type === "number") {
          control.number_input.value = String(next_value);
          control.range_input.value = String(clamp(
            next_value,
            Number(control.range_input.min),
            Number(control.range_input.max)
          ));
          render_slider_track(control.range_input);
        }

        try {
          await refresh_scene({
            reload_mascot:
              path_parts[0] === "mascot" &&
              (
                path_parts[1] === "enabled" ||
                path_parts[1] === "face_asset_path" ||
                path_parts[1] === "halo_asset_path"
              ),
            restart_animation: false
          });

          if (path_parts[0] === "performance" && path_parts[1] === "desynchronized") {
            set_preset_meta("The canvas desynchronized flag changes on next page reload.", false);
          } else {
            set_preset_meta("Live config updated. Save adds a new preset or updates the matching name.", false);
          }
        } catch (error) {
          console.error(error);
          set_preset_meta(`Config update failed: ${error.message}`, true);
        }
      }

      async function apply_preset_by_id(preset_id) {
        const preset = state.presets.find((entry) => entry.id === preset_id);
        if (!preset) {
          return;
        }

        state.active_preset_id = preset.id;
        state.selected_preset_id = preset.id;
        replace_config(preset.config);
        preset_name_input.value = preset.name;
        sync_editor_values();
        render_preset_tabs();
        save_presets_to_storage();

        try {
          await refresh_scene({ reload_mascot: true });
          set_preset_meta(`Loaded preset "${preset.name}".`, false);
        } catch (error) {
          console.error(error);
          set_preset_meta(`Preset load failed: ${error.message}`, true);
        }
      }

      function build_preset_payload(name, snapshot) {
        return {
          id: create_preset_id(),
          name,
          config: normalize_config_snapshot(snapshot)
        };
      }

      function save_preset() {
        collapse_state_presets();
        const preset_name = get_requested_preset_name();
        const existing_preset = find_preset_by_name(preset_name);

        if (existing_preset) {
          existing_preset.name = preset_name;
          existing_preset.config = normalize_config_snapshot(config);
          state.active_preset_id = existing_preset.id;
          state.selected_preset_id = existing_preset.id;
          preset_name_input.value = existing_preset.name;
          render_preset_tabs();
          save_presets_to_storage();
          set_preset_meta(`Updated "${existing_preset.name}".`, false);
          return;
        }

        const preset = build_preset_payload(preset_name, config);
        state.presets.push(preset);
        state.active_preset_id = preset.id;
        state.selected_preset_id = preset.id;
        preset_name_input.value = preset.name;
        render_preset_tabs();
        save_presets_to_storage();
        set_preset_meta(`Saved "${preset.name}" as a new preset.`, false);
      }

      function delete_active_preset() {
        if (!state.active_preset_id) {
          return;
        }

        const preset = state.presets.find((entry) => entry.id === state.active_preset_id);
        const should_delete = window.confirm(`Delete preset "${preset ? preset.name : "this preset"}"?`);
        if (!should_delete) {
          return;
        }

        state.presets = state.presets.filter((entry) => entry.id !== state.active_preset_id);
        state.active_preset_id = null;
        state.selected_preset_id = state.presets[0]?.id || null;
        preset_name_input.value = get_next_preset_name();
        render_preset_tabs();
        save_presets_to_storage();
        set_preset_meta("Preset deleted. Current config stayed in place.", false);
      }

      async function export_current_preset() {
        const preset_name = get_requested_preset_name();
        const payload = {
          name: preset_name,
          config: normalize_config_snapshot(config)
        };
        const file_name = `${sanitize_file_name(preset_name)}.json`;

        try {
          let directory_handle = await get_export_directory_handle();
          if (!directory_handle) {
            directory_handle = await request_export_directory_handle();
          }

          if (directory_handle) {
            const file_handle = await directory_handle.getFileHandle(file_name, { create: true });
            await write_json_file(file_handle, payload);
            set_preset_meta(`Exported "${preset_name}" to ${directory_handle.name}/${file_name}.`, false);
            return;
          }

          if (typeof window.showSaveFilePicker === "function") {
            const file_handle = await window.showSaveFilePicker({
              id: "radial-mascot-preset-file",
              suggestedName: file_name,
              startIn: "documents",
              types: [
                {
                  description: "JSON preset",
                  accept: {
                    "application/json": [".json"]
                  }
                }
              ]
            });
            await write_json_file(file_handle, payload);
            set_preset_meta(`Exported "${preset_name}" as ${file_name}.`, false);
            return;
          }

          const blob = new Blob([JSON.stringify(payload, null, 2)], {
            type: "application/json"
          });
          const object_url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = object_url;
          link.download = file_name;
          link.click();
          URL.revokeObjectURL(object_url);
          set_preset_meta(`Exported "${preset_name}" as ${file_name}.`, false);
        } catch (error) {
          if (is_abort_error(error)) {
            return;
          }

          console.error(error);
          set_preset_meta(`Export failed: ${error.message}`, true);
        }
      }

      async function import_presets_from_file(file) {
        const file_text = await file.text();
        const parsed = JSON.parse(file_text);
        const entries = Array.isArray(parsed) ? parsed : [parsed];
        const imported_presets = [];

        for (let index = 0; index < entries.length; index += 1) {
          const preset = normalize_preset_entry(entries[index], get_next_preset_name());
          if (preset) {
            state.presets.push(preset);
            imported_presets.push(preset);
          }
        }

        if (imported_presets.length === 0) {
          throw new Error("No presets were found in that file.");
        }

        collapse_state_presets();
        render_preset_tabs();
        save_presets_to_storage();
        const newest_imported_preset = find_preset_by_name(imported_presets[imported_presets.length - 1].name);
        if (newest_imported_preset) {
          await apply_preset_by_id(newest_imported_preset.id);
        }
        set_preset_meta(`Imported ${imported_presets.length} preset${imported_presets.length === 1 ? "" : "s"}.`, false);
      }

      function reset_to_defaults() {
        replace_config(get_active_default_config());
        state.active_preset_id = null;
        state.selected_preset_id = state.presets[0]?.id || null;
        preset_name_input.value = get_next_preset_name();
        sync_editor_values();
        render_preset_tabs();
        save_presets_to_storage();
        return refresh_scene({ reload_mascot: true })
          .then(() => {
            set_preset_meta(
              state.browser_default_config
                ? "Reset to your saved browser default config."
                : "Reset to the factory default config.",
              false
            );
          })
          .catch((error) => {
            console.error(error);
            set_preset_meta(`Reset failed: ${error.message}`, true);
          });
      }

      function set_current_as_browser_default() {
        save_browser_default_config(config);
        set_preset_meta("Saved the current config as your browser default. Reset Defaults will return to it.", false);
      }

      function activate_selected_preset() {
        if (!state.selected_preset_id || state.selected_preset_id === state.active_preset_id) {
          return;
        }

        void apply_preset_by_id(state.selected_preset_id);
      }

      function get_mascot_draw_box() {
        const draw_size_px = config.mascot.base_width_px * config.mascot.scale;
        const center_x_px = config.composition.center_x_px + config.mascot.offset_x_px;
        const center_y_px = config.composition.center_y_px + config.mascot.offset_y_px;

        return {
          center_x_px,
          center_y_px,
          draw_size_px,
          left_px: center_x_px - draw_size_px * 0.5,
          top_px: center_y_px - draw_size_px * 0.5
        };
      }

      function get_mascot_asset_url(asset_path) {
        return encodeURI(asset_path).replace(/#/g, "%23");
      }

      async function load_image_asset(asset_path, label) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.decoding = "async";
          image.addEventListener("load", () => resolve(image), { once: true });
          image.addEventListener("error", () => {
            reject(new Error(`Could not load mascot ${label} asset: ${asset_path}`));
          }, { once: true });
          image.src = get_mascot_asset_url(asset_path);
        });
      }

      async function load_mascot_images() {
        if (!config.mascot.enabled) {
          state.mascot_face_image = null;
          state.mascot_halo_image = null;
          return;
        }

        const [face_image, halo_image] = await Promise.all([
          load_image_asset(config.mascot.face_asset_path, "face"),
          load_image_asset(config.mascot.halo_asset_path, "halo")
        ]);

        state.mascot_face_image = face_image;
        state.mascot_halo_image = halo_image;
      }

      function build_scene_data() {
        const generator = config.generator_wrangle;
        const transition = config.transition_wrangle;
        const stage_size_px = STAGE_SIZE_PX;
        const center_x_px = config.composition.center_x_px;
        const center_y_px = config.composition.center_y_px;
        const radial_scale = config.composition.radial_scale;
        const rotation_rad = radians(config.composition.global_rotation_deg);
        const mascot_box = config.mascot.enabled ? get_mascot_draw_box() : null;
        const geometry_scale = mascot_box ? mascot_box.draw_size_px / stage_size_px : 1;
        const inner_radius = stage_size_px * radial_scale * generator.inner_radius * geometry_scale;
        const outer_radius = stage_size_px * radial_scale * generator.outer_radius * geometry_scale;
        const radius_span = outer_radius - inner_radius;
        const base_pscale_px = transition.base_pscale * config.point_style.base_pscale_px_per_unit * geometry_scale;
        const fade_delay_sec = config.mascot_fade.enabled ? config.mascot_fade.duration_sec : 0;
        const head_turn_delay_sec = config.head_turn.enabled ? config.head_turn.duration_sec : 0;
        const head_turn_overlap_sec = config.head_turn.enabled
          ? clamp(config.head_turn.dot_overlap_sec ?? 0, 0, head_turn_delay_sec)
          : 0;
        const start_delay_sec = Math.max(
          fade_delay_sec,
          Math.max(0, head_turn_delay_sec - head_turn_overlap_sec)
        );
        const duration_sec = Math.max(0.001, transition.duration_sec);
        const emit_duration_sec = duration_sec * clamp(transition.emit_frac, 0.001, 1);
        const orbit_count_start_frac = clamp(transition.orbit_count_start_frac ?? 0, 0, 1);
        const orbit_count_end_frac = clamp(
          transition.orbit_count_end_frac ?? 1,
          orbit_count_start_frac,
          1
        );
        const orbit_count_start_sec = start_delay_sec + orbit_count_start_frac * duration_sec;
        const orbit_count_end_sec = start_delay_sec + orbit_count_end_frac * duration_sec;
        const dot_end_sec = start_delay_sec + duration_sec;
        const finale_start_sec = dot_end_sec + Math.max(0, config.finale.delay_after_dots_sec || 0);
        const finale_end_sec = config.finale.enabled
          ? finale_start_sec + Math.max(0.001, config.finale.duration_sec)
          : finale_start_sec;
        const blink_anchor_sec = config.finale.enabled ? finale_end_sec : dot_end_sec;
        const blink_start_sec = blink_anchor_sec + Math.max(0, config.blink.start_delay_sec || 0);
        const blink_end_sec = config.blink.enabled
          ? blink_start_sec + Math.max(0.0001, config.blink.duration_sec || 0)
          : blink_anchor_sec;
        const base_angle_rad = radians(generator.base_angle_deg) + rotation_rad;
        const spawn_angle_rad = radians(generator.anim_start_angle_deg + transition.spawn_angle_offset_deg) + rotation_rad;
        const phase_mask_radius_px = 250 * geometry_scale;
        const phase_mask_center_offset_x_px = 50 * geometry_scale;
        const use_reference_phase_masks = generator.phase_count === 2;

        const spoke_specs = new Array(generator.spoke_count);
        const min_diameter_px =
          (config.point_style.min_diameter_px ?? config.point_style.min_rect_px ?? 0.9) * geometry_scale;

        // Match the generator wrangle: spoke lengths ramp within repeating phase segments.
        // We keep the ramp continuous, then fit dots by radius so a spoke only drops a dot
        // when that dot would actually stick out past the available filled length.
        for (let spoke_id = 0; spoke_id < generator.spoke_count; spoke_id += 1) {
          const spoke_pattern_id = wrap_positive(
            spoke_id - generator.pattern_offset_spokes,
            generator.spoke_count
          );

          const segment_id = Math.min(
            generator.phase_count - 1,
            Math.floor(spoke_pattern_id * generator.phase_count / generator.spoke_count)
          );
          const segment_start = Math.floor(segment_id * generator.spoke_count / generator.phase_count);
          const segment_end = Math.floor((segment_id + 1) * generator.spoke_count / generator.phase_count) - 1;
          const segment_length = Math.max(1, segment_end - segment_start + 1);
          const segment_index = spoke_pattern_id - segment_start;
          const fill_u = segment_length <= 1 ? 1 : segment_index / (segment_length - 1);
          const continuous_active_orbits = clamp(
            generator.min_active_orbits +
            fill_u * (generator.num_orbits - generator.min_active_orbits),
            generator.min_active_orbits,
            generator.num_orbits
          );
          const reach_u = generator.num_orbits <= 1
            ? 1
            : (continuous_active_orbits - 1) / (generator.num_orbits - 1);
          const phase_frontier_dist_u = compute_phase_frontier_dist_u(
            spoke_pattern_id,
            generator.spoke_count,
            generator.phase_count
          );
          const phase_frontier_scale = compute_frontier_scale(
            phase_frontier_dist_u,
            transition.phase_frontier_amount,
            transition.phase_frontier_width_u,
            transition.phase_frontier_bias
          );
          const target_angle = base_angle_rad - TAU * spoke_id / generator.spoke_count;
          const phase_mask_center_x_px = segment_id === 0
            ? center_x_px - phase_mask_center_offset_x_px
            : center_x_px + phase_mask_center_offset_x_px;

          spoke_specs[spoke_id] = {
            spoke_pattern_id,
            target_angle,
            segment_id,
            reach_u,
            fill_end_radius: inner_radius + radius_span * reach_u,
            phase_frontier_scale,
            phase_mask_center_x_px,
            phase_mask_center_y_px: center_y_px,
            phase_mask_radius_px
          };
        }

        function get_spoke_point_metrics(spoke_spec, orbit_id) {
          const orbit_u = generator.num_orbits <= 1 ? 0 : orbit_id / (generator.num_orbits - 1);
          const radius = inner_radius + radius_span * orbit_u;
          const point_x = center_x_px + Math.cos(spoke_spec.target_angle) * radius;
          const point_y = center_y_px + Math.sin(spoke_spec.target_angle) * radius;
          const orbital_frontier_dist_u = Math.max(0, spoke_spec.reach_u - orbit_u);
          const orbital_frontier_scale = compute_frontier_scale(
            orbital_frontier_dist_u,
            transition.orbital_frontier_amount,
            transition.orbital_frontier_width_u,
            transition.orbital_frontier_bias
          );
          const final_scale = base_pscale_px * orbital_frontier_scale * spoke_spec.phase_frontier_scale;
          const diameter_px = Math.max(min_diameter_px, final_scale);
          const radius_px = diameter_px * 0.5;
          const phase_mask_distance_px = Math.hypot(
            point_x - spoke_spec.phase_mask_center_x_px,
            point_y - spoke_spec.phase_mask_center_y_px
          );

          return {
            orbit_u,
            radius,
            diameter_px,
            radius_px,
            fits_within_spoke: use_reference_phase_masks
              ? phase_mask_distance_px + radius_px <= spoke_spec.phase_mask_radius_px + 0.01
              : radius + radius_px <= spoke_spec.fill_end_radius + 0.01
          };
        }

        const orbit_counts = new Array(generator.num_orbits).fill(0);
        for (let orbit_id = 0; orbit_id < generator.num_orbits; orbit_id += 1) {
          let count = 0;
          for (let spoke_id = 0; spoke_id < generator.spoke_count; spoke_id += 1) {
            if (get_spoke_point_metrics(spoke_specs[spoke_id], orbit_id).fits_within_spoke) {
              count += 1;
            }
          }
          orbit_counts[orbit_id] = count;
        }

        const max_orbit_count = Math.max(1, ...orbit_counts);
        const shot_interval_sec = max_orbit_count > 1
          ? emit_duration_sec / (max_orbit_count - 1)
          : emit_duration_sec;
        const base_speed_deg_per_sec = 360 * transition.spins / duration_sec;
        const capture_start_sec = start_delay_sec + transition.capture_start_frac * duration_sec;
        const orbit_count_from = clamp(generator.min_active_orbits, 1, generator.num_orbits);
        const orbit_count_to = clamp(generator.num_orbits, orbit_count_from, generator.num_orbits);

        state.dot_end_sec = dot_end_sec;
        state.finale_start_sec = finale_start_sec;
        state.finale_end_sec = finale_end_sec;
        state.playback_end_sec = Math.max(finale_end_sec, blink_end_sec);
        state.blink_start_sec = blink_start_sec;
        state.blink_end_sec = blink_end_sec;
        state.spawn_angle_rad = spawn_angle_rad;
        state.mascot_box = mascot_box;

        const points = [];
        const spokes = new Array(generator.spoke_count);
        const orbit_rank_counts = new Array(generator.num_orbits).fill(0);

        // Static geometry is precomputed so the frame loop only solves angular position.
        for (let spoke_id = 0; spoke_id < generator.spoke_count; spoke_id += 1) {
          const spoke_spec = spoke_specs[spoke_id];
          const is_upper_half = Math.sin(spoke_spec.target_angle) < 0;

          spokes[spoke_id] = {
            angle: spoke_spec.target_angle,
            start_radius: config.spoke_lines.start_radius_px * geometry_scale,
            end_radius: outer_radius + config.spoke_lines.end_radius_extra_px * geometry_scale,
            inner_clip_center_x_px: is_upper_half
              ? center_x_px - phase_mask_center_offset_x_px
              : center_x_px + phase_mask_center_offset_x_px,
            inner_clip_center_y_px: center_y_px,
            inner_clip_radius_px: phase_mask_radius_px
          };

          for (let orbit_id = 0; orbit_id < generator.num_orbits; orbit_id += 1) {
            const point_metrics = get_spoke_point_metrics(spoke_spec, orbit_id);
            if (!point_metrics.fits_within_spoke) {
              continue;
            }

            const orbit_rank = orbit_rank_counts[orbit_id];
            const speed_index = transition.inner_faster
              ? orbit_id
              : (generator.num_orbits - 1 - orbit_id);
            const speed_deg_per_sec = base_speed_deg_per_sec *
              Math.pow(Math.max(0.0001, transition.speed_mult_per_orbit), speed_index);
            const visible_delay_sec = transition.occlusion_arc_deg / Math.max(0.0001, speed_deg_per_sec);
            const raw_birth_sec = start_delay_sec +
              orbit_rank * shot_interval_sec +
              orbit_id * transition.orbit_stagger_frac * shot_interval_sec;
            let orbit_unlock_sec = start_delay_sec;
            if (transition.animate_orbit_count && orbit_count_to > orbit_count_from) {
              const orbit_target_index = orbit_id + 1;
              const orbit_unlock_u = clamp(
                (orbit_target_index - orbit_count_from) / (orbit_count_to - orbit_count_from),
                0,
                1
              );
              orbit_unlock_sec = lerp(orbit_count_start_sec, orbit_count_end_sec, orbit_unlock_u);
            }

            const birth_sec = Math.max(raw_birth_sec, orbit_unlock_sec);
            const visible_sec = birth_sec + visible_delay_sec;
            const point_capture_start_sec = Math.max(capture_start_sec, visible_sec);

            points.push({
              center_x_px,
              center_y_px,
              radius: point_metrics.radius,
              target_angle: spoke_spec.target_angle,
              orbit_id,
              speed_rad_per_sec: radians(speed_deg_per_sec),
              birth_sec,
              visible_sec,
              capture_start_sec: point_capture_start_sec,
              diameter_px: point_metrics.diameter_px,
              radius_px: point_metrics.radius_px
            });

            orbit_rank_counts[orbit_id] += 1;
          }
        }

        state.points = points;
        state.spokes = spokes;
      }

      function compute_mascot_fade_amount(playback_time_sec) {
        if (!config.mascot_fade.enabled) {
          return 1;
        }

        return smoothstep(
          0,
          Math.max(0.0001, config.mascot_fade.duration_sec),
          playback_time_sec
        );
      }

      function compute_head_turn_deg(local_time_sec) {
        if (!config.head_turn.enabled) {
          return 0;
        }

        const duration_sec = Math.max(0.0001, config.head_turn.duration_sec);

        if (local_time_sec <= 0 || local_time_sec >= duration_sec) {
          return 0;
        }

        const turn_u = clamp(local_time_sec / duration_sec, 0, 1);
        const peak_frac = clamp(config.head_turn.peak_frac, 0.05, 0.45);
        const reverse_frac = clamp(config.head_turn.reverse_frac ?? 0.56, peak_frac + 0.05, 0.85);
        const overshoot_frac = clamp(config.head_turn.overshoot_frac, reverse_frac + 0.05, 0.98);

        if (turn_u < peak_frac) {
          return lerp(0, config.head_turn.peak_angle_deg, smoothstep(0, peak_frac, turn_u));
        }

        if (turn_u < reverse_frac) {
          return lerp(
            config.head_turn.peak_angle_deg,
            config.head_turn.reverse_angle_deg,
            smoothstep(peak_frac, reverse_frac, turn_u)
          );
        }

        if (turn_u < overshoot_frac) {
          return lerp(
            config.head_turn.reverse_angle_deg,
            config.head_turn.overshoot_angle_deg,
            smoothstep(reverse_frac, overshoot_frac, turn_u)
          );
        }

        return lerp(
          config.head_turn.overshoot_angle_deg,
          0,
          smoothstep(overshoot_frac, 1, turn_u)
        );
      }

      function compute_blink_curve(blink_u) {
        const close_frac = clamp(config.blink.close_frac, 0.05, 0.9);
        const hold_end_frac = clamp(close_frac + config.blink.hold_closed_frac, close_frac, 0.98);

        if (blink_u < close_frac) {
          return smoothstep(0, close_frac, blink_u);
        }

        if (blink_u < hold_end_frac) {
          return 1;
        }

        return 1 - smoothstep(hold_end_frac, 1, blink_u);
      }

      function compute_blink_amount(playback_time_sec) {
        if (
          !config.blink.enabled ||
          playback_time_sec < state.blink_start_sec ||
          playback_time_sec > state.blink_end_sec
        ) {
          return 0;
        }

        const blink_u = clamp(
          (playback_time_sec - state.blink_start_sec) / Math.max(0.0001, config.blink.duration_sec),
          0,
          1
        );
        return compute_blink_curve(blink_u);
      }

      function compute_head_turn_eye_squint_amount(playback_time_sec) {
        if (!config.head_turn.enabled) {
          return 0;
        }

        const duration_sec = Math.max(0.0001, config.head_turn.duration_sec);

        if (playback_time_sec <= 0 || playback_time_sec >= duration_sec) {
          return 0;
        }

        const ease_sec = Math.min(0.03, duration_sec * 0.18);
        const close_amount = smoothstep(0, ease_sec, playback_time_sec);
        const open_amount = 1 - smoothstep(duration_sec - ease_sec, duration_sec, playback_time_sec);
        return clamp(close_amount * open_amount, 0, 1);
      }

      function compute_finale_progress(playback_time_sec, force_final) {
        if (!config.finale.enabled) {
          return {
            halo_u: 0
          };
        }

        return {
          halo_u: force_final
            ? 1
            : smoothstep(state.finale_start_sec, state.finale_end_sec, playback_time_sec)
        };
      }

      function draw_annulus_sector(center_x_px, center_y_px, inner_radius_px, outer_radius_px, start_angle_rad, end_angle_rad, anticlockwise = false) {
        context.beginPath();
        context.arc(center_x_px, center_y_px, outer_radius_px, start_angle_rad, end_angle_rad, anticlockwise);
        context.arc(center_x_px, center_y_px, inner_radius_px, end_angle_rad, start_angle_rad, !anticlockwise);
        context.closePath();
      }

      function draw_full_annulus(center_x_px, center_y_px, inner_radius_px, outer_radius_px) {
        context.beginPath();
        context.arc(center_x_px, center_y_px, outer_radius_px, 0, TAU);
        context.arc(center_x_px, center_y_px, inner_radius_px, TAU, 0, true);
        context.closePath();
      }

      function clip_finale_halo_region(
        box,
        halo_u,
        mask_start_angle_rad,
        sweep_end_angle_rad,
        halo_inner_radius_px,
        halo_outer_radius_px,
        force_final
      ) {
        if (halo_u <= 0) {
          return false;
        }

        if (force_final || halo_u >= 0.999) {
          draw_full_annulus(
            box.center_x_px,
            box.center_y_px,
            halo_inner_radius_px,
            halo_outer_radius_px
          );
        } else {
          draw_annulus_sector(
            box.center_x_px,
            box.center_y_px,
            halo_inner_radius_px,
            halo_outer_radius_px,
            mask_start_angle_rad,
            sweep_end_angle_rad,
            true
          );
        }

        context.clip();
        return true;
      }

      function trace_spoke_path(spoke) {
        const x0 = config.composition.center_x_px + Math.cos(spoke.angle) * spoke.start_radius;
        const y0 = config.composition.center_y_px + Math.sin(spoke.angle) * spoke.start_radius;
        const x1 = config.composition.center_x_px + Math.cos(spoke.angle) * spoke.end_radius;
        const y1 = config.composition.center_y_px + Math.sin(spoke.angle) * spoke.end_radius;
        context.moveTo(x0, y0);
        context.lineTo(x1, y1);
      }

      function draw_reference_halo_layer(
        box,
        base_alpha,
        halo_u,
        mask_start_angle_rad,
        sweep_end_angle_rad,
        halo_inner_radius_px,
        halo_outer_radius_px,
        force_final
      ) {
        if (!state.mascot_halo_image || halo_u <= 0) {
          return;
        }

        context.save();
        if (!clip_finale_halo_region(
          box,
          halo_u,
          mask_start_angle_rad,
          sweep_end_angle_rad,
          halo_inner_radius_px,
          halo_outer_radius_px,
          force_final
        )) {
          context.restore();
          return;
        }

        context.globalAlpha = base_alpha * HALO_REFERENCE_OPACITY;
        context.drawImage(
          state.mascot_halo_image,
          box.left_px,
          box.top_px,
          box.draw_size_px,
          box.draw_size_px
        );
        context.globalCompositeOperation = "source-atop";
        context.fillStyle = HALO_REFERENCE_COLOR;
        context.fillRect(box.left_px, box.top_px, box.draw_size_px, box.draw_size_px);
        context.restore();
      }

      function draw_procedural_halo_spokes(
        box,
        base_alpha,
        halo_u,
        mask_start_angle_rad,
        sweep_end_angle_rad,
        halo_inner_radius_px,
        halo_outer_radius_px,
        force_final
      ) {
        if (state.spokes.length === 0 || halo_u <= 0) {
          return;
        }

        const outer_width_px = Math.max(0, config.spoke_lines.width_px || 0);
        const inner_width_px = Math.max(0, config.spoke_lines.inner_width_px || 0);

        if (outer_width_px > 0) {
          context.save();
          if (clip_finale_halo_region(
            box,
            halo_u,
            mask_start_angle_rad,
            sweep_end_angle_rad,
            halo_inner_radius_px,
            halo_outer_radius_px,
            force_final
          )) {
            context.globalAlpha = base_alpha;
            context.strokeStyle = config.spoke_lines.color;
            context.lineWidth = outer_width_px;
            context.beginPath();
            for (let spoke_index = 0; spoke_index < state.spokes.length; spoke_index += 1) {
              trace_spoke_path(state.spokes[spoke_index]);
            }
            context.stroke();
          }
          context.restore();
        }

        if (inner_width_px <= 0) {
          return;
        }

        for (let spoke_index = 0; spoke_index < state.spokes.length; spoke_index += 1) {
          const spoke = state.spokes[spoke_index];

          context.save();
          if (!clip_finale_halo_region(
            box,
            halo_u,
            mask_start_angle_rad,
            sweep_end_angle_rad,
            halo_inner_radius_px,
            halo_outer_radius_px,
            force_final
          )) {
            context.restore();
            continue;
          }

          context.beginPath();
          context.arc(
            spoke.inner_clip_center_x_px,
            spoke.inner_clip_center_y_px,
            spoke.inner_clip_radius_px,
            0,
            TAU
          );
          context.clip();
          context.globalAlpha = base_alpha;
          context.strokeStyle = config.spoke_lines.color;
          context.lineWidth = inner_width_px;
          context.beginPath();
          trace_spoke_path(spoke);
          context.stroke();
          context.restore();
        }
      }

      function draw_mascot_nose(box, nose_offset_px, base_alpha) {
        if (base_alpha <= 0) {
          return;
        }

        const scale = box.draw_size_px / MASCOT_VIEWBOX_SIZE;
        if (scale <= 0) {
          return;
        }

        context.save();
        context.translate(box.left_px, box.top_px);
        context.scale(scale, scale);
        context.globalAlpha = base_alpha;
        context.fillStyle = config.mascot.color;
        context.fill(MASCOT_NOSE_PATH);
        context.translate(0, -nose_offset_px / scale);
        context.fillStyle = STAGE_BACKGROUND_COLOR;
        context.fill(MASCOT_NOSE_PATH);
        context.restore();
      }

      function draw_mascot_eyes(box, eye_amount, base_alpha) {
        const closed_eye_scale_y = clamp(config.blink.eye_scale_y_closed, 0.02, 1);
        const eye_scale_y = lerp(1, closed_eye_scale_y, eye_amount);

        context.save();
        context.fillStyle = "#ffffff";
        context.globalAlpha = base_alpha;

        for (let eye_index = 0; eye_index < MASCOT_EYE_SPECS.length; eye_index += 1) {
          const eye = MASCOT_EYE_SPECS[eye_index];
          const center_x_px = box.left_px + box.draw_size_px * (eye.cx / MASCOT_VIEWBOX_SIZE);
          const center_y_px = box.top_px + box.draw_size_px * (eye.cy / MASCOT_VIEWBOX_SIZE);
          const radius_x_px = box.draw_size_px * (eye.radius / MASCOT_VIEWBOX_SIZE);
          const radius_y_px = Math.max(0.75, radius_x_px * eye_scale_y);

          context.beginPath();
          context.ellipse(center_x_px, center_y_px, radius_x_px, radius_y_px, 0, 0, TAU);
          context.fill();
        }

        context.restore();
      }

      function draw_mascot(playback_time_sec, force_final) {
        if (!config.mascot.enabled || !state.mascot_face_image || !state.mascot_box) {
          return;
        }

        const box = state.mascot_box;
        const fade_amount = force_final ? 1 : compute_mascot_fade_amount(playback_time_sec);
        const base_alpha = clamp(config.mascot.opacity * fade_amount, 0, 1);
        if (base_alpha <= 0) {
          return;
        }
        const head_turn_deg = force_final ? 0 : compute_head_turn_deg(playback_time_sec);
        const blink_amount = force_final ? 0 : compute_blink_amount(playback_time_sec);
        const head_turn_eye_amount = force_final ? 0 : compute_head_turn_eye_squint_amount(playback_time_sec);
        const combined_eye_amount = Math.max(blink_amount, head_turn_eye_amount);
        const nose_bob_px = config.sneeze.enabled ? config.sneeze.nose_bob_up_px * combined_eye_amount : 0;
        const { halo_u } = compute_finale_progress(playback_time_sec, force_final);
        const pattern_angle_offset_rad =
          -TAU * (config.generator_wrangle.pattern_offset_spokes || 0) /
          Math.max(1, config.generator_wrangle.spoke_count || 1);
        const mask_start_angle_rad =
          radians((config.finale.start_angle_deg || 0) + (config.finale.mask_angle_offset_deg || 0)) +
          pattern_angle_offset_rad +
          radians(config.composition.global_rotation_deg || 0);
        const sweep_end_angle_rad = mask_start_angle_rad - TAU * halo_u;
        const halo_inner_radius_px = box.draw_size_px * clamp(config.finale.halo_inner_radius_u, 0.01, 0.5);
        const halo_outer_radius_px = box.draw_size_px * 0.5;

        context.save();
        context.imageSmoothingEnabled = true;
        context.translate(box.center_x_px, box.center_y_px);
        context.rotate(radians(head_turn_deg));
        context.translate(-box.center_x_px, -box.center_y_px);
        draw_reference_halo_layer(
          box,
          base_alpha,
          halo_u,
          mask_start_angle_rad,
          sweep_end_angle_rad,
          halo_inner_radius_px,
          halo_outer_radius_px,
          force_final
        );
        draw_procedural_halo_spokes(
          box,
          base_alpha,
          halo_u,
          mask_start_angle_rad,
          sweep_end_angle_rad,
          halo_inner_radius_px,
          halo_outer_radius_px,
          force_final
        );
        context.globalAlpha = base_alpha;
        context.drawImage(
          state.mascot_face_image,
          box.left_px,
          box.top_px,
          box.draw_size_px,
          box.draw_size_px
        );
        draw_mascot_nose(box, nose_bob_px, base_alpha);
        draw_mascot_eyes(box, combined_eye_amount, base_alpha);

        context.restore();
      }

      function resize_canvas(playback_time_sec = state.playback_time_sec) {
        const stage_size_px = STAGE_SIZE_PX;
        const dpr = Math.min(window.devicePixelRatio || 1, config.performance.max_device_pixel_ratio);

        canvas.width = Math.round(stage_size_px * dpr);
        canvas.height = Math.round(stage_size_px * dpr);

        state.dpr = dpr;
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
        context.imageSmoothingEnabled = false;

        build_scene_data();
        render_playback_frame(playback_time_sec);
      }

      function draw_points(time_sec, force_final, playback_time_sec) {
        if (state.points.length === 0) {
          return;
        }

        context.save();
        context.fillStyle = config.point_style.color;
        const alpha_ramp_duration_sec = Math.max(0, config.transition_wrangle.alpha_ramp_duration_sec || 0);
        const finale_duration_sec = Math.max(0.0001, state.finale_end_sec - state.finale_start_sec);
        const dot_fade_start_sec = state.finale_start_sec + clamp(config.finale.dot_fade_start_frac, 0, 1) * finale_duration_sec;
        const dot_fade_u = config.finale.enabled
          ? smoothstep(dot_fade_start_sec, state.finale_end_sec, playback_time_sec)
          : 0;
        const dot_alpha_mult = 1 - clamp(config.finale.dot_fade_amount, 0, 1) * dot_fade_u;

        for (let point_index = 0; point_index < state.points.length; point_index += 1) {
          const point = state.points[point_index];

          if (!force_final && time_sec < point.birth_sec) {
            continue;
          }

          if (
            !force_final &&
            config.transition_wrangle.hide_invisible_by_pscale &&
            time_sec < point.visible_sec
          ) {
            continue;
          }

          let angle = point.target_angle;

          if (!force_final) {
            const live_age_sec = Math.max(0, time_sec - point.birth_sec);
            const live_angle = state.spawn_angle_rad - point.speed_rad_per_sec * live_age_sec;

            // Capture blends angularly from the live orbit into the target angle, never across the circle.
            const capture_duration_sec = Math.max(
              0.0001,
              state.dot_end_sec - point.capture_start_sec
            );
            const raw_capture_u = clamp(
              (time_sec - point.capture_start_sec) / capture_duration_sec,
              0,
              1
            );
            const capture_u = raw_capture_u * raw_capture_u * (3 - 2 * raw_capture_u);
            const delta_angle = wrap_positive(live_angle - point.target_angle, TAU);

            angle = live_angle - delta_angle * capture_u;
          }

          const point_x = point.center_x_px + Math.cos(angle) * point.radius;
          const point_y = point.center_y_px + Math.sin(angle) * point.radius;

          let point_alpha = config.point_style.alpha;
          if (!force_final && alpha_ramp_duration_sec > 0) {
            const alpha_start_sec = Math.max(point.birth_sec, point.visible_sec);
            const alpha_u = smoothstep(
              alpha_start_sec,
              alpha_start_sec + alpha_ramp_duration_sec,
              time_sec
            );
            point_alpha *= alpha_u;
          }

          point_alpha *= dot_alpha_mult;

          if (point_alpha <= 0) {
            continue;
          }

          context.globalAlpha = point_alpha;
          context.beginPath();
          context.moveTo(point_x + point.radius_px, point_y);
          context.arc(point_x, point_y, point.radius_px, 0, TAU);
          context.fill();
        }

        context.restore();
      }

      function render_scene(time_sec, options = {}) {
        const force_dot_final = Boolean(options.force_dot_final);
        const force_mascot_final = Boolean(options.force_mascot_final);
        const playback_time_sec = options.playback_time_sec ?? time_sec;

        context.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        context.globalAlpha = 1;
        context.fillStyle = STAGE_BACKGROUND_COLOR;
        context.fillRect(0, 0, STAGE_SIZE_PX, STAGE_SIZE_PX);

        draw_points(time_sec, force_dot_final, playback_time_sec);
        draw_mascot(playback_time_sec, force_mascot_final);
      }

      function render_playback_frame(playback_time_sec) {
        const clamped_playback_time_sec = clamp(playback_time_sec, 0, state.playback_end_sec);
        const dot_time_sec = Math.min(clamped_playback_time_sec, state.dot_end_sec);
        const is_dot_animation_complete = clamped_playback_time_sec >= state.dot_end_sec;
        const is_playback_complete = clamped_playback_time_sec >= state.playback_end_sec;
        state.playback_time_sec = clamped_playback_time_sec;

        render_scene(dot_time_sec, {
          force_dot_final: is_dot_animation_complete,
          force_mascot_final: is_playback_complete,
          playback_time_sec: clamped_playback_time_sec
        });

        return {
          playback_time_sec: clamped_playback_time_sec,
          is_playback_complete
        };
      }

      function render_current_frame(now_ms = performance.now(), skip_schedule) {
        const elapsed_sec = Math.max(0, (now_ms - state.animation_start_ms) / 1000);
        const { is_playback_complete } = render_playback_frame(elapsed_sec);

        if (!skip_schedule && !is_playback_complete) {
          state.animation_frame_id = requestAnimationFrame((frame_now_ms) => {
            render_current_frame(frame_now_ms, false);
          });
        } else if (!skip_schedule) {
          stop_animation();
        }
      }

      function stop_animation() {
        if (state.animation_frame_id) {
          cancelAnimationFrame(state.animation_frame_id);
          state.animation_frame_id = 0;
        }
      }

      function start_animation() {
        stop_animation();
        state.animation_start_ms = performance.now();
        state.animation_frame_id = requestAnimationFrame((frame_now_ms) => {
          render_current_frame(frame_now_ms, false);
        });
      }

      async function export_png_sequence() {
        if (state.is_exporting) {
          return;
        }

        if (typeof window.showDirectoryPicker !== "function") {
          set_preset_meta("PNG sequence export needs Chrome or Edge because it relies on folder access.", true);
          return;
        }

        const export_button_label = export_sequence_button ? export_sequence_button.textContent : "";

        try {
          state.is_exporting = true;
          stop_animation();

          if (export_sequence_button) {
            export_sequence_button.disabled = true;
            export_sequence_button.textContent = "Exporting...";
          }

          const output_selection = await get_sequence_output_directory_handle();
          if (!output_selection) {
            return;
          }

          const frame_rate = Math.max(1, Math.round(config.export_settings.frame_rate || 24));
          const frame_count = Math.max(1, Math.floor(state.playback_end_sec * frame_rate) + 1);

          for (let frame_index = 0; frame_index < frame_count; frame_index += 1) {
            const playback_time_sec = Math.min(frame_index / frame_rate, state.playback_end_sec);
            render_playback_frame(playback_time_sec);

            const blob = await canvas_to_blob("image/png");
            const file_handle = await output_selection.directory_handle.getFileHandle(
              `frame-${String(frame_index + 1).padStart(4, "0")}.png`,
              { create: true }
            );
            await write_blob_file(file_handle, blob);

            if (
              frame_index === 0 ||
              frame_index === frame_count - 1 ||
              (frame_index + 1) % Math.max(1, Math.round(frame_rate * 0.5)) === 0
            ) {
              set_preset_meta(
                `Exporting PNG sequence: frame ${frame_index + 1}/${frame_count} at ${frame_rate} fps.`,
                false
              );
              await new Promise((resolve) => {
                requestAnimationFrame(resolve);
              });
            }
          }

          set_preset_meta(
            `Exported ${frame_count} PNG frames at ${frame_rate} fps to ${output_selection.output_path_label}.`,
            false
          );
        } catch (error) {
          if (!is_abort_error(error)) {
            console.error(error);
            set_preset_meta(`PNG export failed: ${error.message}`, true);
          }
        } finally {
          state.is_exporting = false;
          if (export_sequence_button) {
            export_sequence_button.disabled = false;
            export_sequence_button.textContent = export_button_label || "Export PNG Seq";
          }
          start_animation();
        }
      }

      function handle_stage_click() {
        start_animation();
      }

      function attach_ui_events() {
        replay_button.addEventListener("click", () => {
          start_animation();
        });

        export_sequence_button.addEventListener("click", () => {
          void export_png_sequence();
        });

        stage.addEventListener("click", handle_stage_click);

        if (!is_local_editor) {
          return;
        }

        drawer_toggle_button.addEventListener("click", () => {
          toggle_drawer();
        });

        drawer_backdrop.addEventListener("click", () => {
          set_drawer_open(false);
        });

        drawer_close_button.addEventListener("click", () => {
          set_drawer_open(false);
        });

        reset_button.addEventListener("click", () => {
          void reset_to_defaults();
        });

        set_defaults_button.addEventListener("click", () => {
          set_current_as_browser_default();
        });

        preset_save_button.addEventListener("click", () => {
          save_preset();
        });

        preset_delete_button.addEventListener("click", () => {
          delete_active_preset();
        });

        preset_export_button.addEventListener("click", () => {
          void export_current_preset();
        });

        preset_import_input.addEventListener("change", (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) {
            return;
          }

          void import_presets_from_file(file)
            .catch((error) => {
              console.error(error);
              set_preset_meta(`Import failed: ${error.message}`, true);
            })
            .finally(() => {
              preset_import_input.value = "";
            });
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !document.body.classList.contains("editor-docked")) {
            set_drawer_open(false);
          }
        });
      }

      async function init() {
        if (is_local_editor) {
          state.export_directory_handle = await load_export_directory_handle();
          state.browser_default_config = load_browser_default_config();
          load_presets_from_storage();
          if (state.active_preset_id) {
            const active_preset = state.presets.find((preset) => preset.id === state.active_preset_id);
            if (active_preset) {
              replace_config(active_preset.config);
              preset_name_input.value = active_preset.name;
            }
          } else if (state.browser_default_config) {
            replace_config(state.browser_default_config);
            preset_name_input.value = get_next_preset_name();
          } else {
            preset_name_input.value = get_next_preset_name();
          }

          build_config_editor();
          sync_editor_values();
          render_preset_tabs();
          update_editor_panel_mode();
        } else {
          drawer_toggle_button.hidden = true;
          drawer_backdrop.hidden = true;
          control_panel.hidden = true;
          set_defaults_button.hidden = true;
          reset_button.hidden = true;
        }

        attach_ui_events();
        await refresh_scene({ reload_mascot: true });
        if (is_local_editor) {
          set_preset_meta("Presets are stored in this browser. Save adds a preset when the name is new, otherwise it updates that preset.", false);
        }

        window.addEventListener("resize", () => {
          update_editor_panel_mode();
          apply_stage_styles();
          resize_canvas();
        });

        const resize_observer = new ResizeObserver(() => {
          apply_stage_styles();
          resize_canvas();
        });

        resize_observer.observe(stage);
      }

      init().catch((error) => {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
