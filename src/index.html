<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radial Mascot Transition</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body class="is-dark">
  <button class="p-button is-dense drawer-toggle" type="button" data-drawer-toggle aria-expanded="false" aria-controls="control-drawer">Controls</button>
  <button class="drawer-backdrop" type="button" data-drawer-backdrop aria-label="Close controls"></button>
  <div class="l-application mascot-app is-dark">
    <main class="l-main">
      <div class="p-panel">
        <div class="p-panel__content viewer-panel__content">
          <section class="stage" data-stage aria-label="Animated mascot point field">
            <canvas aria-hidden="true"></canvas>
            <div class="overlay" aria-hidden="true">
              <div class="overlay-inner" data-overlay-inner>
                <div class="mascot" data-mascot>
                  <div class="mascot-svg" data-mascot-svg></div>
                </div>
              </div>
            </div>
          </section>
          <div class="viewer-actions">
            <button class="p-button is-dense" type="button" data-replay-button>Replay</button>
            <button class="p-button--base is-dense" type="button" data-reset-button>Reset Defaults</button>
          </div>
        </div>
      </div>
    </main>

    <aside class="l-aside is-collapsed" id="control-drawer" data-control-panel aria-label="Animation controls">
      <div class="p-panel drawer-panel">
        <div class="p-panel__header is-sticky">
          <h1 class="p-panel__title">Radial Mascot Transition</h1>
          <div class="p-panel__controls">
            <button class="p-button--base is-dense" type="button" data-drawer-close>Close</button>
          </div>
        </div>
        <div class="p-panel__content drawer-panel__content">
          <div class="u-fixed-width drawer-content">
            <div class="preset-panel-content" data-preset-panel hidden>
              <form class="p-form p-form--stacked preset-editor" onsubmit="return false;">
                <div class="p-form__group preset-toolbar__name">
                  <label class="p-form__label" for="preset-name">Preset name</label>
                  <div class="p-form__control">
                    <input class="p-form-validation__input is-dense" id="preset-name" type="text" data-preset-name placeholder="Preset name">
                  </div>
                </div>
              </form>
              <div class="preset-toolbar">
                <button class="p-button is-dense" type="button" data-preset-save>Save New</button>
                <button class="p-button--base is-dense" type="button" data-preset-overwrite>Update</button>
                <button class="p-button--base is-dense" type="button" data-preset-export>Export</button>
                <label class="p-button--base is-dense file-button" for="preset-import">Import
                  <input class="file-button__input" id="preset-import" type="file" accept=".json,application/json" data-preset-import>
                </label>
                <button class="p-button--base is-dense" type="button" data-preset-delete>Delete</button>
              </div>

              <div class="preset-tabs" data-preset-tabs></div>
              <p class="p-form-help-text preset-meta" data-preset-meta>Presets are stored in this browser. Save New adds another preset.</p>
            </div>
            <div class="config-sections" data-config-editor></div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    (() => {
      const TAU = Math.PI * 2;
      const STAGE_SIZE_PX = 600;
      const STAGE_DISPLAY_SIZE_PX = 600;
      const STAGE_BACKGROUND_COLOR = "#262626";
      const mascot_viewbox_width = 227.9;
      const mascot_viewbox_height = 182.85;

      const config = {
        mascot_fade: {
          enabled: false,
          duration_sec: 0.25
        },
        head_turn: {
          enabled: true,
          duration_sec: 0.15,
          peak_angle_deg: -30,
          overshoot_angle_deg: -3,
          peak_frac: 0.22,
          overshoot_frac: 0.75
        },
        composition: {
          center_x_px: 300,
          center_y_px: 300,
          radial_scale: 0.92,
          global_rotation_deg: 0
        },
        generator_wrangle: {
          inner_radius: 0.253,
          outer_radius: 0.493,
          num_orbits: 12,
          spoke_count: 60,
          phase_count: 2,
          min_active_orbits: 3,
          base_angle_deg: 6,
          pattern_offset_spokes: 0,
          anim_start_angle_deg: 270
        },
        transition_wrangle: {
          duration_sec: 1,
          spins: 3,
          emit_frac: 0.05,
          alpha_ramp_duration_sec: 0.14,
          animate_orbit_count: true,
          orbit_count_start_frac: 0,
          orbit_count_end_frac: 1,
          capture_start_frac: 0.25,
          orbit_stagger_frac: 1,
          speed_mult_per_orbit: 0.85,
          inner_faster: true,
          spawn_angle_offset_deg: 0,
          occlusion_arc_deg: 0,
          hide_invisible_by_pscale: true,
          base_pscale: 0.628,
          orbital_frontier_amount: -1,
          orbital_frontier_width_u: 1,
          orbital_frontier_bias: 0.676,
          phase_frontier_amount: 0.655,
          phase_frontier_width_u: 0.57,
          phase_frontier_bias: 1
        },
        point_style: {
          color: "#ffffff",
          alpha: 1,
          base_pscale_px_per_unit: 4.0,
          min_scale: 0.3,
          min_diameter_px: 0.9
        },
        spoke_lines: {
          enabled: true,
          color: "#333333",
          width_px: 1,
          start_radius_px: 100,
          end_radius_extra_px: 10
        },
        mascot: {
          enabled: true,
          asset_path: "./assets/racoon-mascot-01.svg",
          base_width_px: 176,
          scale: 1,
          offset_x_px: 0,
          offset_y_px: 8,
          color: "#ffffff",
          opacity: 1
        },
        sneeze: {
          enabled: true,
          nose_bob_up_px: 1.5
        },
        blink: {
          enabled: true,
          start_delay_sec: 0.04,
          duration_sec: 0.12,
          close_frac: 0.42,
          hold_closed_frac: 0.12,
          eye_scale_y_closed: 0.08
        },
        interactivity: {
          replay_on_stage_click: true,
          sneeze_on_mascot_click: true
        },
        performance: {
          max_device_pixel_ratio: 2,
          desynchronized: true
        }
      };

      const stage = document.querySelector("[data-stage]");
      const canvas = stage.querySelector("canvas");
      const overlay_inner = stage.querySelector("[data-overlay-inner]");
      const mascot = stage.querySelector("[data-mascot]");
      const mascot_svg = stage.querySelector("[data-mascot-svg]");
      const app_root = document.querySelector(".mascot-app");
      const control_panel = document.querySelector("[data-control-panel]") || document.querySelector("#control-drawer");
      const drawer_toggle_button = document.querySelector("[data-drawer-toggle]");
      const drawer_backdrop = document.querySelector("[data-drawer-backdrop]");
      const drawer_close_button = document.querySelector("[data-drawer-close]");
      const replay_button = document.querySelector("[data-replay-button]");
      const reset_button = document.querySelector("[data-reset-button]");
      const preset_name_input = document.querySelector("[data-preset-name]");
      const preset_save_button = document.querySelector("[data-preset-save]");
      const preset_overwrite_button = document.querySelector("[data-preset-overwrite]");
      const preset_export_button = document.querySelector("[data-preset-export]");
      const preset_import_input = document.querySelector("[data-preset-import]");
      const preset_delete_button = document.querySelector("[data-preset-delete]");
      const preset_tabs = document.querySelector("[data-preset-tabs]");
      const preset_meta = document.querySelector("[data-preset-meta]");
      const preset_panel = document.querySelector("[data-preset-panel]");
      const config_editor = document.querySelector("[data-config-editor]");
      const context = canvas.getContext("2d", {
        alpha: false,
        desynchronized: config.performance.desynchronized
      });

      const state = {
        dpr: 1,
        dot_end_sec: 1,
        playback_end_sec: 1,
        blink_start_sec: 1,
        blink_end_sec: 1,
        spawn_angle_rad: 0,
        points: [],
        spokes: [],
        eye_nodes: [],
        nose_node: null,
        manual_sneeze_start_ms: 0,
        animation_frame_id: 0,
        animation_start_ms: performance.now(),
        refresh_serial: 0,
        presets: [],
        active_preset_id: null,
        active_editor_tab_key: null,
        editor_controls: new Map()
      };

      const is_webkit_slider_engine = /\b(?:Chrome|CriOS|Safari|Edg|HeadlessChrome)\b/i.test(navigator.userAgent) &&
        !/\bFirefox\b/i.test(navigator.userAgent);

      const PRESET_STORAGE_KEY = "radial-mascot-presets-v1";
      const ACTIVE_PRESET_STORAGE_KEY = "radial-mascot-active-preset-v1";
      const is_local_editor = location.protocol === "file:" ||
        ["localhost", "127.0.0.1", "::1", "[::1]"].includes(location.hostname);
      const EDITOR_TAB_GROUPS = [
        {
          key: "presets",
          label: "Presets",
          sections: []
        },
        {
          key: "timing",
          label: "Timing",
          sections: ["mascot_fade", "head_turn", "sneeze", "blink"]
        },
        {
          key: "mascot",
          label: "Mascot",
          sections: []
        },
        {
          key: "orbits",
          label: "Orbits",
          sections: ["generator_wrangle", "transition_wrangle", "point_style", "spoke_lines"]
        },
        {
          key: "behavior",
          label: "Behavior",
          sections: ["interactivity", "performance"]
        }
      ];

      function clamp(value, min_value, max_value) {
        return Math.min(max_value, Math.max(min_value, value));
      }

      function deep_clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function is_plain_object(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      const default_config = deep_clone(config);

      function lerp(min_value, max_value, amount) {
        return min_value + (max_value - min_value) * amount;
      }

      function smoothstep(edge_0, edge_1, value) {
        if (edge_0 === edge_1) {
          return value < edge_0 ? 0 : 1;
        }

        const t = clamp((value - edge_0) / (edge_1 - edge_0), 0, 1);
        return t * t * (3 - 2 * t);
      }

      function radians(value_deg) {
        return value_deg * Math.PI / 180;
      }

      function wrap_positive(value, modulus) {
        const wrapped = value % modulus;
        return wrapped < 0 ? wrapped + modulus : wrapped;
      }

      function hash_01(a, b) {
        const sample = Math.sin(a * 127.1 + b * 311.7) * 43758.5453123;
        return sample - Math.floor(sample);
      }

      function humanize_key(value) {
        return value
          .replace(/_/g, " ")
          .replace(/([a-z])([A-Z])/g, "$1 $2")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function set_active_editor_tab(next_tab_key) {
        state.active_editor_tab_key = next_tab_key;

        for (const tab of config_editor.querySelectorAll("[data-editor-tab]")) {
          const is_active = tab.dataset.editorTab === next_tab_key;
          tab.setAttribute("aria-selected", String(is_active));
          tab.setAttribute("tabindex", is_active ? "0" : "-1");
        }

        for (const panel of config_editor.querySelectorAll("[data-editor-panel]")) {
          panel.hidden = panel.dataset.editorPanel !== next_tab_key;
        }
      }

      function focus_adjacent_editor_tab(current_tab_key, direction) {
        const current_index = EDITOR_TAB_GROUPS.findIndex((group) => group.key === current_tab_key);
        if (current_index === -1) {
          return;
        }

        const next_index = wrap_positive(current_index + direction, EDITOR_TAB_GROUPS.length);
        const next_group = EDITOR_TAB_GROUPS[next_index];
        set_active_editor_tab(next_group.key);

        const next_tab = config_editor.querySelector(`[data-editor-tab="${next_group.key}"]`);
        if (next_tab) {
          next_tab.focus();
        }
      }

      function is_hex_color_string(value) {
        return typeof value === "string" && /^#[0-9a-f]{6}$/i.test(value);
      }

      function get_config_value(path_parts) {
        let cursor = config;
        for (let index = 0; index < path_parts.length; index += 1) {
          cursor = cursor[path_parts[index]];
        }
        return cursor;
      }

      function set_config_value(path_parts, next_value) {
        let cursor = config;
        for (let index = 0; index < path_parts.length - 1; index += 1) {
          cursor = cursor[path_parts[index]];
        }
        cursor[path_parts[path_parts.length - 1]] = next_value;
      }

      function merge_known_config_values(target, source) {
        if (!is_plain_object(target) || !is_plain_object(source)) {
          return;
        }

        for (const key of Object.keys(target)) {
          if (!(key in source)) {
            continue;
          }

          const target_value = target[key];
          const source_value = source[key];

          if (is_plain_object(target_value)) {
            if (is_plain_object(source_value)) {
              merge_known_config_values(target_value, source_value);
            }
            continue;
          }

          if (typeof target_value === "number") {
            const next_number = Number(source_value);
            if (Number.isFinite(next_number)) {
              target[key] = next_number;
            }
            continue;
          }

          if (typeof target_value === "boolean") {
            if (typeof source_value === "boolean") {
              target[key] = source_value;
            }
            continue;
          }

          if (typeof target_value === "string" && typeof source_value === "string") {
            target[key] = source_value;
          }
        }
      }

      function normalize_config_snapshot(source) {
        const snapshot = deep_clone(default_config);
        merge_known_config_values(snapshot, source);
        snapshot.composition = deep_clone(default_config.composition);
        snapshot.mascot.enabled = default_config.mascot.enabled;
        snapshot.mascot.asset_path = default_config.mascot.asset_path;
        snapshot.mascot.base_width_px = default_config.mascot.base_width_px;
        snapshot.mascot.offset_x_px = default_config.mascot.offset_x_px;
        snapshot.mascot.offset_y_px = default_config.mascot.offset_y_px;
        snapshot.mascot.color = default_config.mascot.color;
        snapshot.mascot.opacity = default_config.mascot.opacity;
        return snapshot;
      }

      function replace_config(source) {
        const snapshot = normalize_config_snapshot(source);
        for (const key of Object.keys(config)) {
          config[key] = snapshot[key];
        }
      }

      function compute_frontier_scale(distance_u, amount, width_u, bias) {
        const safe_width_u = Math.max(0.0001, width_u);
        const safe_bias = Math.max(0.001, bias);
        const frontier_u = Math.pow(smoothstep(0, safe_width_u, distance_u), safe_bias);
        return Math.max(config.point_style.min_scale, 1 - amount * (1 - frontier_u));
      }

      function compute_phase_frontier_dist_u(spoke_pattern_id, spoke_count, phase_count) {
        const segment_id = Math.min(
          phase_count - 1,
          Math.floor(spoke_pattern_id * phase_count / spoke_count)
        );
        const segment_start = Math.floor(segment_id * spoke_count / phase_count);
        const segment_end = Math.floor((segment_id + 1) * spoke_count / phase_count) - 1;
        const segment_length = Math.max(1, segment_end - segment_start + 1);
        const segment_index = spoke_pattern_id - segment_start;

        if (segment_length <= 1) {
          return 1;
        }

        return clamp(segment_index / (segment_length - 1), 0, 1);
      }

      function apply_stage_styles() {
        document.body.style.background = STAGE_BACKGROUND_COLOR;
        stage.style.width = `min(${STAGE_DISPLAY_SIZE_PX}px, calc(100vw - 3rem), calc(100svh - 5.5rem))`;
        stage.style.borderRadius = "0";
        stage.style.background = STAGE_BACKGROUND_COLOR;
        stage.style.borderColor = "transparent";
        stage.style.boxShadow = "none";
      }

      function set_preset_meta(message, is_error = false) {
        preset_meta.textContent = message;
        preset_meta.classList.toggle("is-error", is_error);
      }

      function get_next_preset_name() {
        let index = state.presets.length + 1;
        const existing_names = new Set(state.presets.map((preset) => preset.name));
        while (existing_names.has(`Preset ${index}`)) {
          index += 1;
        }
        return `Preset ${index}`;
      }

      function get_requested_preset_name() {
        return preset_name_input.value.trim() || get_next_preset_name();
      }

      function create_preset_id() {
        return `preset-${Date.now()}-${Math.floor(Math.random() * 1e6)}`;
      }

      function sanitize_file_name(value) {
        return value.trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "preset";
      }

      function get_numeric_control_spec(path_key, value) {
        const numeric_specs = {
          "mascot_fade.duration_sec": { min: 0, max: 3, step: 0.01 },
          "head_turn.duration_sec": { min: 0, max: 1, step: 0.01 },
          "head_turn.peak_angle_deg": { min: -90, max: 90, step: 0.1 },
          "head_turn.overshoot_angle_deg": { min: -90, max: 90, step: 0.1 },
          "head_turn.peak_frac": { min: 0, max: 1, step: 0.01 },
          "head_turn.overshoot_frac": { min: 0, max: 1, step: 0.01 },
          "composition.center_x_px": { min: 0, max: 600, step: 1 },
          "composition.center_y_px": { min: 0, max: 600, step: 1 },
          "composition.radial_scale": { min: 0, max: 1.5, step: 0.01 },
          "composition.global_rotation_deg": { min: -180, max: 180, step: 0.1 },
          "generator_wrangle.inner_radius": { min: 0, max: 1, step: 0.001 },
          "generator_wrangle.outer_radius": { min: 0, max: 1, step: 0.001 },
          "generator_wrangle.num_orbits": { min: 1, max: 24, step: 1 },
          "generator_wrangle.spoke_count": { min: 1, max: 180, step: 1 },
          "generator_wrangle.phase_count": { min: 1, max: 24, step: 1 },
          "generator_wrangle.min_active_orbits": { min: 1, max: 24, step: 1 },
          "generator_wrangle.base_angle_deg": { min: -180, max: 180, step: 0.1 },
          "generator_wrangle.pattern_offset_spokes": { min: -180, max: 180, step: 1 },
          "generator_wrangle.anim_start_angle_deg": { min: -180, max: 180, step: 0.1 },
          "transition_wrangle.duration_sec": { min: 0, max: 4, step: 0.01 },
          "transition_wrangle.spins": { min: 0, max: 10, step: 0.01 },
          "transition_wrangle.emit_frac": { min: 0, max: 1, step: 0.01 },
          "transition_wrangle.alpha_ramp_duration_sec": { min: 0, max: 2, step: 0.01 },
          "transition_wrangle.orbit_count_start_frac": { min: 0, max: 1, step: 0.01 },
          "transition_wrangle.orbit_count_end_frac": { min: 0, max: 1, step: 0.01 },
          "transition_wrangle.capture_start_frac": { min: 0, max: 1, step: 0.01 },
          "transition_wrangle.orbit_stagger_frac": { min: 0, max: 2, step: 0.01 },
          "transition_wrangle.speed_mult_per_orbit": { min: 0, max: 2, step: 0.01 },
          "transition_wrangle.spawn_angle_offset_deg": { min: -180, max: 180, step: 0.1 },
          "transition_wrangle.occlusion_arc_deg": { min: 0, max: 360, step: 0.1 },
          "transition_wrangle.base_pscale": { min: 0, max: 3, step: 0.001 },
          "transition_wrangle.orbital_frontier_amount": { min: -2, max: 2, step: 0.01 },
          "transition_wrangle.orbital_frontier_width_u": { min: 0, max: 2, step: 0.01 },
          "transition_wrangle.orbital_frontier_bias": { min: 0, max: 3, step: 0.01 },
          "transition_wrangle.phase_frontier_amount": { min: -2, max: 2, step: 0.01 },
          "transition_wrangle.phase_frontier_width_u": { min: 0, max: 2, step: 0.01 },
          "transition_wrangle.phase_frontier_bias": { min: 0, max: 3, step: 0.01 },
          "point_style.alpha": { min: 0, max: 1, step: 0.01 },
          "point_style.base_pscale_px_per_unit": { min: 0, max: 20, step: 0.1 },
          "point_style.min_scale": { min: 0, max: 1, step: 0.01 },
          "point_style.min_diameter_px": { min: 0, max: 12, step: 0.1 },
          "spoke_lines.width_px": { min: 0, max: 12, step: 0.1 },
          "spoke_lines.start_radius_px": { min: 0, max: 300, step: 1 },
          "spoke_lines.end_radius_extra_px": { min: -120, max: 120, step: 1 },
          "mascot.base_width_px": { min: 0, max: 400, step: 1 },
          "mascot.scale": { min: 0, max: 4, step: 0.01 },
          "mascot.offset_x_px": { min: -240, max: 240, step: 1 },
          "mascot.offset_y_px": { min: -240, max: 240, step: 1 },
          "mascot.opacity": { min: 0, max: 1, step: 0.01 },
          "sneeze.nose_bob_up_px": { min: 0, max: 20, step: 0.1 },
          "blink.start_delay_sec": { min: 0, max: 1, step: 0.01 },
          "blink.duration_sec": { min: 0, max: 1, step: 0.01 },
          "blink.close_frac": { min: 0, max: 1, step: 0.01 },
          "blink.hold_closed_frac": { min: 0, max: 1, step: 0.01 },
          "blink.eye_scale_y_closed": { min: 0, max: 1, step: 0.01 },
          "performance.max_device_pixel_ratio": { min: 1, max: 4, step: 0.1 }
        };

        const explicit_spec = numeric_specs[path_key];
        if (explicit_spec) {
          return explicit_spec;
        }

        const magnitude = Math.max(1, Math.abs(value));
        return {
          min: value < 0 ? -magnitude * 2 : 0,
          max: magnitude * 2,
          step: magnitude >= 10 ? 1 : 0.01
        };
      }

      function get_slider_palette() {
        const styles = getComputedStyle(app_root);
        return {
          progress: styles.getPropertyValue("--vf-color-link-default").trim() || "#ffffff",
          empty: styles.getPropertyValue("--vf-color-border-default").trim() || "#4b4b4b"
        };
      }

      function render_slider_track(range_input) {
        if (!range_input) {
          return;
        }

        const min = Number(range_input.min || 0);
        const max = Number(range_input.max || 100);
        const value = Number(range_input.value || 0);
        const span = Math.max(0.0001, max - min);
        const fill_ratio = clamp((value - min) / span, 0, 1);
        const palette = get_slider_palette();

        range_input.style.accentColor = palette.progress;
        range_input.style.backgroundRepeat = "no-repeat";
        range_input.style.backgroundSize = "100% 100%";

        if (!is_webkit_slider_engine) {
          range_input.style.backgroundImage = "";
          return;
        }

        const fill_percent = (fill_ratio * 100).toFixed(3);
        range_input.style.backgroundImage =
          `linear-gradient(to right, ${palette.progress} 0%, ${palette.progress} ${fill_percent}%, ${palette.empty} ${fill_percent}%, ${palette.empty} 100%)`;
      }

      function refresh_slider_tracks() {
        for (const control of state.editor_controls.values()) {
          if (control.type === "number") {
            render_slider_track(control.range_input);
          }
        }
      }

      function sync_editor_values() {
        for (const [path_key, control] of state.editor_controls.entries()) {
          const value = get_config_value(path_key.split("."));
          if (control.type === "number") {
            control.range_input.value = String(clamp(value, Number(control.range_input.min), Number(control.range_input.max)));
            control.number_input.value = String(value);
            continue;
          }

          if (control.input.type === "checkbox") {
            control.input.checked = Boolean(value);
          } else {
            control.input.value = String(value);
          }
        }

        refresh_slider_tracks();
      }

      function update_preset_controls() {
        preset_overwrite_button.disabled = !state.active_preset_id;
        preset_delete_button.disabled = !state.active_preset_id;
      }

      function set_drawer_open(next_state) {
        document.body.classList.toggle("drawer-open", next_state);
        control_panel.classList.toggle("is-collapsed", !next_state);
        drawer_toggle_button.setAttribute("aria-expanded", String(next_state));
        drawer_toggle_button.textContent = next_state ? "Close" : "Controls";
      }

      function toggle_drawer() {
        set_drawer_open(!document.body.classList.contains("drawer-open"));
      }

      function save_presets_to_storage() {
        try {
          window.localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(state.presets));
          if (state.active_preset_id) {
            window.localStorage.setItem(ACTIVE_PRESET_STORAGE_KEY, state.active_preset_id);
          } else {
            window.localStorage.removeItem(ACTIVE_PRESET_STORAGE_KEY);
          }
        } catch (error) {
          console.error(error);
          set_preset_meta("Preset storage is not available in this browser.", true);
        }
      }

      function normalize_preset_entry(entry, fallback_name) {
        if (!is_plain_object(entry)) {
          return null;
        }

        const snapshot_source = is_plain_object(entry.config) ? entry.config : entry;
        return {
          id: typeof entry.id === "string" && entry.id ? entry.id : create_preset_id(),
          name: typeof entry.name === "string" && entry.name.trim() ? entry.name.trim() : fallback_name,
          config: normalize_config_snapshot(snapshot_source)
        };
      }

      function load_presets_from_storage() {
        state.presets = [];
        state.active_preset_id = null;

        try {
          const raw_presets = window.localStorage.getItem(PRESET_STORAGE_KEY);
          const parsed_presets = raw_presets ? JSON.parse(raw_presets) : [];
          if (Array.isArray(parsed_presets)) {
            state.presets = parsed_presets
              .map((entry, index) => normalize_preset_entry(entry, `Preset ${index + 1}`))
              .filter(Boolean);
          }

          const saved_active_id = window.localStorage.getItem(ACTIVE_PRESET_STORAGE_KEY);
          if (saved_active_id && state.presets.some((preset) => preset.id === saved_active_id)) {
            state.active_preset_id = saved_active_id;
          }
        } catch (error) {
          console.error(error);
          state.presets = [];
          state.active_preset_id = null;
          set_preset_meta("Saved presets could not be read. Storage was reset.", true);
        }
      }

      function render_preset_tabs() {
        preset_tabs.innerHTML = "";

        if (state.presets.length === 0) {
          const empty_state = document.createElement("p");
          empty_state.className = "p-form-help-text preset-empty";
          empty_state.textContent = "No saved presets yet.";
          preset_tabs.appendChild(empty_state);
          update_preset_controls();
          return;
        }

        const tabs = document.createElement("div");
        tabs.className = "p-tabs";

        const list = document.createElement("div");
        list.className = "p-tabs__list";
        list.setAttribute("role", "tablist");
        list.setAttribute("aria-label", "Saved presets");

        for (let index = 0; index < state.presets.length; index += 1) {
          const preset = state.presets[index];
          const item = document.createElement("div");
          item.className = "p-tabs__item";

          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "p-tabs__link";
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-selected", String(preset.id === state.active_preset_id));
          tab.setAttribute("tabindex", preset.id === state.active_preset_id ? "0" : "-1");
          tab.textContent = preset.name;
          tab.addEventListener("click", () => {
            void apply_preset_by_id(preset.id);
          });
          item.appendChild(tab);
          list.appendChild(item);
        }

        tabs.appendChild(list);
        preset_tabs.appendChild(tabs);
        update_preset_controls();
      }

      function create_control_input(path_key, value) {
        if (typeof value === "number") {
          const numeric_spec = get_numeric_control_spec(path_key, value);
          const field = document.createElement("div");
          field.className = "p-slider__wrapper control-composite";

          const range_input = document.createElement("input");
          range_input.type = "range";
          range_input.className = "u-no-margin--bottom";
          range_input.min = String(numeric_spec.min);
          range_input.max = String(numeric_spec.max);
          range_input.step = String(numeric_spec.step);
          range_input.value = String(clamp(value, numeric_spec.min, numeric_spec.max));
          range_input.dataset.configPath = path_key;
          range_input.addEventListener("input", handle_control_commit);
          range_input.addEventListener("change", handle_control_commit);

          const number_input = document.createElement("input");
          number_input.type = "number";
          number_input.className = "p-slider__input p-form-validation__input is-dense u-no-margin--bottom";
          number_input.step = "any";
          number_input.value = String(value);
          number_input.dataset.configPath = path_key;
          number_input.addEventListener("input", handle_control_commit);
          number_input.addEventListener("change", handle_control_commit);

          field.appendChild(range_input);
          field.appendChild(number_input);

          return {
            element: field,
            control: {
              type: "number",
              range_input,
              number_input
            }
          };
        }

        const input = document.createElement("input");
        input.dataset.configPath = path_key;

        if (typeof value === "boolean") {
          const checkbox = document.createElement("label");
          checkbox.className = "p-checkbox control-checkbox";

          input.type = "checkbox";
          input.className = "p-checkbox__input";
          input.checked = value;
          input.addEventListener("change", handle_control_commit);

          const label = document.createElement("span");
          label.className = "p-checkbox__label";
          label.textContent = humanize_key(path_key.split(".").pop());

          checkbox.appendChild(input);
          checkbox.appendChild(label);
          return {
            element: checkbox,
            control: {
              type: "single",
              input
            }
          };
        }

        if (is_hex_color_string(value)) {
          input.type = "color";
          input.className = "p-form-validation__input is-dense control-color u-no-margin--bottom";
          input.value = value;
          input.addEventListener("input", handle_control_commit);
          return {
            element: input,
            control: {
              type: "single",
              input
            }
          };
        }

        input.type = "text";
        input.className = "p-form-validation__input is-dense u-no-margin--bottom";
        input.value = value;
        input.addEventListener("change", handle_control_commit);
        return {
          element: input,
          control: {
            type: "single",
            input
          }
        };
      }

      function create_control_row(path_parts, value) {
        const path_key = path_parts.join(".");
        const row = document.createElement("div");
        row.className = "p-form__group";

        if (typeof value === "boolean") {
          const input_bundle = create_control_input(path_key, value);
          state.editor_controls.set(path_key, input_bundle.control);
          const control = document.createElement("div");
          control.className = "p-form__control";
          control.appendChild(input_bundle.element);
          row.appendChild(control);
          return row;
        }

        const label = document.createElement("label");
        label.className = "p-form__label";
        label.htmlFor = `control-${path_key.replace(/\./g, "-")}`;
        label.textContent = humanize_key(path_parts[path_parts.length - 1]);

        const input_bundle = create_control_input(path_key, value);
        state.editor_controls.set(path_key, input_bundle.control);
        if (input_bundle.control.type === "number") {
          input_bundle.control.range_input.id = label.htmlFor;
          input_bundle.control.number_input.id = `${label.htmlFor}-value`;
        } else {
          input_bundle.control.input.id = label.htmlFor;
        }

        const control = document.createElement("div");
        control.className = "p-form__control";
        control.appendChild(input_bundle.element);

        row.appendChild(label);
        row.appendChild(control);
        return row;
      }

      function append_editor_fields(parent, object_value, path_parts) {
        for (const [key, value] of Object.entries(object_value)) {
          const next_path = path_parts.concat(key);
          if (is_plain_object(value)) {
            const group = document.createElement("div");
            group.className = "config-group";

            const title = document.createElement("h3");
            title.className = "p-text--small-caps u-no-margin--bottom";
            title.textContent = humanize_key(key);
            group.appendChild(title);

            append_editor_fields(group, value, next_path);
            parent.appendChild(group);
            continue;
          }

          parent.appendChild(create_control_row(next_path, value));
        }
      }

      function build_config_editor() {
        config_editor.innerHTML = "";
        state.editor_controls = new Map();

        const tabs = document.createElement("div");
        tabs.className = "p-tabs config-tabs";

        const list = document.createElement("div");
        list.className = "p-tabs__list";
        list.setAttribute("role", "tablist");
        list.setAttribute("aria-label", "Animation settings");

        const panels = document.createElement("div");
        panels.className = "config-panels";

        for (const group of EDITOR_TAB_GROUPS) {
          const item = document.createElement("div");
          item.className = "p-tabs__item";

          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "p-tabs__link";
          tab.id = `editor-tab-${group.key}`;
          tab.dataset.editorTab = group.key;
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-controls", `editor-panel-${group.key}`);
          tab.textContent = group.label;
          tab.addEventListener("click", () => {
            set_active_editor_tab(group.key);
          });
          tab.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight") {
              event.preventDefault();
              focus_adjacent_editor_tab(group.key, 1);
            }

            if (event.key === "ArrowLeft") {
              event.preventDefault();
              focus_adjacent_editor_tab(group.key, -1);
            }
          });

          item.appendChild(tab);
          list.appendChild(item);

          const panel = document.createElement("section");
          panel.className = "config-panel";
          panel.id = `editor-panel-${group.key}`;
          panel.dataset.editorPanel = group.key;
          panel.setAttribute("role", "tabpanel");
          panel.setAttribute("tabindex", "0");
          panel.setAttribute("aria-labelledby", tab.id);

          const form = document.createElement("form");
          form.className = "p-form p-form--stacked editor-form";
          form.addEventListener("submit", (event) => {
            event.preventDefault();
          });

          if (group.key === "presets" && preset_panel) {
            preset_panel.hidden = false;
            panel.appendChild(preset_panel);
            panels.appendChild(panel);
            continue;
          }

          if (group.key === "mascot") {
            const section = document.createElement("div");
            section.className = "config-section";

            const title = document.createElement("h2");
            title.className = "p-heading--5 u-no-margin--bottom";
            title.textContent = "Mascot";
            section.appendChild(title);

            section.appendChild(create_control_row(["mascot", "scale"], config.mascot.scale));
            form.appendChild(section);
            panel.appendChild(form);
            panels.appendChild(panel);
            continue;
          }

          for (const section_key of group.sections) {
            const section_value = config[section_key];
            if (!is_plain_object(section_value)) {
              continue;
            }

            const section = document.createElement("div");
            section.className = "config-section";

            const title = document.createElement("h2");
            title.className = "p-heading--5 u-no-margin--bottom";
            title.textContent = humanize_key(section_key);
            section.appendChild(title);

            append_editor_fields(section, section_value, [section_key]);
            form.appendChild(section);
          }

          panel.appendChild(form);
          panels.appendChild(panel);
        }

        tabs.appendChild(list);
        config_editor.appendChild(tabs);
        config_editor.appendChild(panels);

        if (!EDITOR_TAB_GROUPS.some((group) => group.key === state.active_editor_tab_key)) {
          state.active_editor_tab_key = EDITOR_TAB_GROUPS[0]?.key || null;
        }

        if (state.active_editor_tab_key) {
          set_active_editor_tab(state.active_editor_tab_key);
        }

        refresh_slider_tracks();
      }

      function parse_control_value(input, current_value) {
        if (typeof current_value === "boolean") {
          return input.checked;
        }

        if (typeof current_value === "number") {
          if (input.value === "") {
            return undefined;
          }

          const next_value = Number(input.value);
          return Number.isFinite(next_value) ? next_value : undefined;
        }

        return input.value;
      }

      async function refresh_scene(options = {}) {
        const refresh_id = ++state.refresh_serial;
        stop_animation();
        apply_stage_styles();

        if (!config.mascot.enabled) {
          mascot_svg.innerHTML = "";
          state.eye_nodes = [];
          state.nose_node = null;
        } else if (options.reload_mascot || !mascot_svg.innerHTML.trim()) {
          await load_mascot_svg();
          if (refresh_id !== state.refresh_serial) {
            return;
          }
        } else {
          cache_eye_nodes();
          cache_mascot_nodes();
        }

        resize_canvas();
        start_animation();
      }

      async function handle_control_commit(event) {
        const input = event.currentTarget;
        const path_parts = input.dataset.configPath.split(".");
        const path_key = path_parts.join(".");
        const current_value = get_config_value(path_parts);
        const next_value = parse_control_value(input, current_value);

        if (typeof next_value === "undefined") {
          return;
        }

        if (next_value === current_value) {
          return;
        }

        set_config_value(path_parts, next_value);
        const control = state.editor_controls.get(path_key);
        if (control && control.type === "number") {
          control.number_input.value = String(next_value);
          control.range_input.value = String(clamp(
            next_value,
            Number(control.range_input.min),
            Number(control.range_input.max)
          ));
          render_slider_track(control.range_input);
        }

        try {
          await refresh_scene({
            reload_mascot:
              path_parts[0] === "mascot" &&
              (path_parts[1] === "asset_path" || path_parts[1] === "enabled")
          });

          if (path_parts[0] === "performance" && path_parts[1] === "desynchronized") {
            set_preset_meta("The canvas desynchronized flag changes on next page reload.", false);
          } else {
            set_preset_meta("Live config updated. Save New adds another preset tab.", false);
          }
        } catch (error) {
          console.error(error);
          set_preset_meta(`Config update failed: ${error.message}`, true);
        }
      }

      async function apply_preset_by_id(preset_id) {
        const preset = state.presets.find((entry) => entry.id === preset_id);
        if (!preset) {
          return;
        }

        state.active_preset_id = preset.id;
        replace_config(preset.config);
        preset_name_input.value = preset.name;
        sync_editor_values();
        render_preset_tabs();
        save_presets_to_storage();

        try {
          await refresh_scene({ reload_mascot: true });
          set_preset_meta(`Loaded preset "${preset.name}".`, false);
        } catch (error) {
          console.error(error);
          set_preset_meta(`Preset load failed: ${error.message}`, true);
        }
      }

      function build_preset_payload(name, snapshot) {
        return {
          id: create_preset_id(),
          name,
          config: normalize_config_snapshot(snapshot)
        };
      }

      function save_new_preset() {
        const preset = build_preset_payload(get_requested_preset_name(), config);
        state.presets.push(preset);
        state.active_preset_id = preset.id;
        preset_name_input.value = preset.name;
        render_preset_tabs();
        save_presets_to_storage();
        set_preset_meta(`Saved "${preset.name}" as a new preset tab.`, false);
      }

      function overwrite_active_preset() {
        if (!state.active_preset_id) {
          save_new_preset();
          return;
        }

        const preset = state.presets.find((entry) => entry.id === state.active_preset_id);
        if (!preset) {
          save_new_preset();
          return;
        }

        preset.name = get_requested_preset_name();
        preset.config = normalize_config_snapshot(config);
        preset_name_input.value = preset.name;
        render_preset_tabs();
        save_presets_to_storage();
        set_preset_meta(`Overwrote "${preset.name}".`, false);
      }

      function delete_active_preset() {
        if (!state.active_preset_id) {
          return;
        }

        const preset = state.presets.find((entry) => entry.id === state.active_preset_id);
        const should_delete = window.confirm(`Delete preset "${preset ? preset.name : "this preset"}"?`);
        if (!should_delete) {
          return;
        }

        state.presets = state.presets.filter((entry) => entry.id !== state.active_preset_id);
        state.active_preset_id = null;
        preset_name_input.value = get_next_preset_name();
        render_preset_tabs();
        save_presets_to_storage();
        set_preset_meta("Preset deleted. Current config stayed in place.", false);
      }

      function export_current_preset() {
        const preset_name = get_requested_preset_name();
        const payload = {
          name: preset_name,
          config: normalize_config_snapshot(config)
        };

        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json"
        });
        const object_url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = object_url;
        link.download = `${sanitize_file_name(preset_name)}.json`;
        link.click();
        URL.revokeObjectURL(object_url);

        set_preset_meta(`Exported "${preset_name}" as JSON.`, false);
      }

      async function import_presets_from_file(file) {
        const file_text = await file.text();
        const parsed = JSON.parse(file_text);
        const entries = Array.isArray(parsed) ? parsed : [parsed];
        const imported_presets = [];

        for (let index = 0; index < entries.length; index += 1) {
          const preset = normalize_preset_entry(entries[index], get_next_preset_name());
          if (preset) {
            state.presets.push(preset);
            imported_presets.push(preset);
          }
        }

        if (imported_presets.length === 0) {
          throw new Error("No presets were found in that file.");
        }

        render_preset_tabs();
        save_presets_to_storage();
        await apply_preset_by_id(imported_presets[imported_presets.length - 1].id);
        set_preset_meta(`Imported ${imported_presets.length} preset${imported_presets.length === 1 ? "" : "s"}.`, false);
      }

      function reset_to_defaults() {
        replace_config(default_config);
        state.active_preset_id = null;
        preset_name_input.value = get_next_preset_name();
        sync_editor_values();
        render_preset_tabs();
        save_presets_to_storage();
        return refresh_scene({ reload_mascot: true })
          .then(() => {
            set_preset_meta("Reset to the default config.", false);
          })
          .catch((error) => {
            console.error(error);
            set_preset_meta(`Reset failed: ${error.message}`, true);
          });
      }

      function is_mascot_hit(client_x, client_y) {
        if (!config.mascot.enabled || mascot.style.display === "none") {
          return false;
        }

        const bounds = mascot.getBoundingClientRect();
        return (
          client_x >= bounds.left &&
          client_x <= bounds.right &&
          client_y >= bounds.top &&
          client_y <= bounds.bottom
        );
      }

      function cache_eye_nodes() {
        const circles = mascot_svg.querySelectorAll("circle");
        state.eye_nodes = Array.from(circles, (circle) => ({
          node: circle,
          cx: Number(circle.getAttribute("cx") || 0),
          cy: Number(circle.getAttribute("cy") || 0)
        }));
      }

      function cache_mascot_nodes() {
        const all_paths = mascot_svg.querySelectorAll("path");
        const nose_node = mascot_svg.querySelector("path.st0") || all_paths[all_paths.length - 1] || null;
        const head_nodes = mascot_svg.querySelectorAll("path.st1, circle.st1");

        for (const head_node of head_nodes) {
          head_node.setAttribute("fill", config.mascot.color);
        }

        if (nose_node) {
          nose_node.setAttribute("fill", STAGE_BACKGROUND_COLOR);
        }

        state.nose_node = nose_node;
      }

      async function load_mascot_svg() {
        if (!config.mascot.enabled) {
          mascot_svg.innerHTML = "";
          state.eye_nodes = [];
          state.nose_node = null;
          return;
        }

        const response = await fetch(config.mascot.asset_path, { cache: "no-store" });
        const svg_markup = await response.text();
        mascot_svg.innerHTML = svg_markup.replace(/<\?xml[\s\S]*?\?>\s*/i, "");
        cache_eye_nodes();
        cache_mascot_nodes();
        update_mascot_animation(0, false, performance.now());
      }

      function apply_overlay_styles() {
        const stage_size_px = STAGE_SIZE_PX;
        const display_scale = stage.getBoundingClientRect().width / stage_size_px;
        const center_x_px = config.composition.center_x_px;
        const center_y_px = config.composition.center_y_px;

        overlay_inner.style.width = stage_size_px + "px";
        overlay_inner.style.height = stage_size_px + "px";
        overlay_inner.style.transform = `scale(${display_scale})`;

        mascot.style.display = config.mascot.enabled ? "block" : "none";
        if (config.mascot.enabled) {
          const mascot_width_px = config.mascot.base_width_px * config.mascot.scale;
          const mascot_height_px = mascot_width_px * mascot_viewbox_height / mascot_viewbox_width;
          const mascot_center_x = center_x_px + config.mascot.offset_x_px;
          const mascot_center_y = center_y_px + config.mascot.offset_y_px;

          mascot.style.left = mascot_center_x - mascot_width_px * 0.5 + "px";
          mascot.style.top = mascot_center_y - mascot_height_px * 0.5 + "px";
          mascot.style.width = mascot_width_px + "px";
          mascot.style.height = mascot_height_px + "px";
          mascot.style.opacity = String(config.mascot.opacity);
        }
      }

      function build_scene_data() {
        const generator = config.generator_wrangle;
        const transition = config.transition_wrangle;
        const stage_size_px = STAGE_SIZE_PX;
        const center_x_px = config.composition.center_x_px;
        const center_y_px = config.composition.center_y_px;
        const radial_scale = config.composition.radial_scale;
        const rotation_rad = radians(config.composition.global_rotation_deg);
        const inner_radius = stage_size_px * radial_scale * generator.inner_radius;
        const outer_radius = stage_size_px * radial_scale * generator.outer_radius;
        const radius_span = outer_radius - inner_radius;
        const base_pscale_px = transition.base_pscale * config.point_style.base_pscale_px_per_unit;
        const fade_delay_sec = config.mascot_fade.enabled ? config.mascot_fade.duration_sec : 0;
        const head_turn_delay_sec = config.head_turn.enabled ? config.head_turn.duration_sec : 0;
        const lead_in_duration_sec = Math.max(fade_delay_sec, head_turn_delay_sec);
        const start_delay_sec = lead_in_duration_sec;
        const duration_sec = Math.max(0.001, transition.duration_sec);
        const emit_duration_sec = duration_sec * clamp(transition.emit_frac, 0.001, 1);
        const orbit_count_start_frac = clamp(transition.orbit_count_start_frac ?? 0, 0, 1);
        const orbit_count_end_frac = clamp(
          transition.orbit_count_end_frac ?? 1,
          orbit_count_start_frac,
          1
        );
        const orbit_count_start_sec = start_delay_sec + orbit_count_start_frac * duration_sec;
        const orbit_count_end_sec = start_delay_sec + orbit_count_end_frac * duration_sec;
        const blink_start_sec = start_delay_sec + duration_sec + config.blink.start_delay_sec;
        const blink_end_sec = config.blink.enabled
          ? blink_start_sec + config.blink.duration_sec
          : start_delay_sec + duration_sec;

        const active_by_spoke = new Array(generator.spoke_count);
        const pattern_index_by_spoke = new Array(generator.spoke_count);
        let total_points = 0;

        // Match the generator wrangle: spoke lengths ramp within repeating phase segments.
        for (let spoke_id = 0; spoke_id < generator.spoke_count; spoke_id += 1) {
          const spoke_pattern_id = wrap_positive(
            spoke_id - generator.pattern_offset_spokes,
            generator.spoke_count
          );
          pattern_index_by_spoke[spoke_id] = spoke_pattern_id;

          const segment_id = Math.min(
            generator.phase_count - 1,
            Math.floor(spoke_pattern_id * generator.phase_count / generator.spoke_count)
          );
          const segment_start = Math.floor(segment_id * generator.spoke_count / generator.phase_count);
          const segment_end = Math.floor((segment_id + 1) * generator.spoke_count / generator.phase_count) - 1;
          const segment_length = Math.max(1, segment_end - segment_start + 1);
          const segment_index = spoke_pattern_id - segment_start;
          const fill_u = segment_length <= 1 ? 1 : segment_index / (segment_length - 1);

          const active_orbits = clamp(
            Math.round(
              generator.min_active_orbits +
              fill_u * (generator.num_orbits - generator.min_active_orbits)
            ),
            generator.min_active_orbits,
            generator.num_orbits
          );

          active_by_spoke[spoke_id] = active_orbits;
          total_points += active_orbits;
        }

        const orbit_counts = new Array(generator.num_orbits).fill(0);
        for (let orbit_id = 0; orbit_id < generator.num_orbits; orbit_id += 1) {
          let count = 0;
          for (let spoke_id = 0; spoke_id < generator.spoke_count; spoke_id += 1) {
            if (active_by_spoke[spoke_id] > orbit_id) {
              count += 1;
            }
          }
          orbit_counts[orbit_id] = count;
        }

        const max_orbit_count = Math.max(1, ...orbit_counts);
        const shot_interval_sec = max_orbit_count > 1
          ? emit_duration_sec / (max_orbit_count - 1)
          : emit_duration_sec;
        const base_speed_deg_per_sec = 360 * transition.spins / duration_sec;
        const capture_start_sec = start_delay_sec + transition.capture_start_frac * duration_sec;
        const base_angle_rad = radians(generator.base_angle_deg) + rotation_rad;
        const spawn_angle_rad = radians(generator.anim_start_angle_deg + transition.spawn_angle_offset_deg) + rotation_rad;
        const orbit_count_from = clamp(generator.min_active_orbits, 1, generator.num_orbits);
        const orbit_count_to = clamp(generator.num_orbits, orbit_count_from, generator.num_orbits);

        state.dot_end_sec = start_delay_sec + duration_sec;
        state.playback_end_sec = blink_end_sec;
        state.blink_start_sec = blink_start_sec;
        state.blink_end_sec = blink_end_sec;
        state.spawn_angle_rad = spawn_angle_rad;

        const points = new Array(total_points);
        const spokes = new Array(generator.spoke_count);
        const orbit_rank_counts = new Array(generator.num_orbits).fill(0);
        let point_index = 0;

        // Static geometry is precomputed so the frame loop only solves angular position.
        for (let spoke_id = 0; spoke_id < generator.spoke_count; spoke_id += 1) {
          const target_angle = base_angle_rad + TAU * spoke_id / generator.spoke_count;
          const spoke_pattern_id = pattern_index_by_spoke[spoke_id];
          const active_orbits = active_by_spoke[spoke_id];
          const reach_u = generator.num_orbits <= 1 ? 1 : (active_orbits - 1) / (generator.num_orbits - 1);

          spokes[spoke_id] = {
            angle: target_angle,
            start_radius: config.spoke_lines.start_radius_px,
            end_radius: outer_radius + config.spoke_lines.end_radius_extra_px
          };

          const phase_frontier_dist_u = compute_phase_frontier_dist_u(
            spoke_pattern_id,
            generator.spoke_count,
            generator.phase_count
          );
          const phase_frontier_scale = compute_frontier_scale(
            phase_frontier_dist_u,
            transition.phase_frontier_amount,
            transition.phase_frontier_width_u,
            transition.phase_frontier_bias
          );

          for (let orbit_id = 0; orbit_id < active_orbits; orbit_id += 1) {
            const orbit_u = generator.num_orbits <= 1 ? 0 : orbit_id / (generator.num_orbits - 1);
            const radius = inner_radius + radius_span * orbit_u;
            const orbit_rank = orbit_rank_counts[orbit_id];
            const speed_index = transition.inner_faster
              ? orbit_id
              : (generator.num_orbits - 1 - orbit_id);
            const speed_deg_per_sec = base_speed_deg_per_sec *
              Math.pow(Math.max(0.0001, transition.speed_mult_per_orbit), speed_index);
            const visible_delay_sec = transition.occlusion_arc_deg / Math.max(0.0001, speed_deg_per_sec);
            const raw_birth_sec = start_delay_sec +
              orbit_rank * shot_interval_sec +
              orbit_id * transition.orbit_stagger_frac * shot_interval_sec;
            let orbit_unlock_sec = start_delay_sec;
            if (transition.animate_orbit_count && orbit_count_to > orbit_count_from) {
              const orbit_target_index = orbit_id + 1;
              const orbit_unlock_u = clamp(
                (orbit_target_index - orbit_count_from) / (orbit_count_to - orbit_count_from),
                0,
                1
              );
              orbit_unlock_sec = lerp(orbit_count_start_sec, orbit_count_end_sec, orbit_unlock_u);
            }

            const birth_sec = Math.max(raw_birth_sec, orbit_unlock_sec);
            const visible_sec = birth_sec + visible_delay_sec;
            const point_capture_start_sec = Math.max(capture_start_sec, visible_sec);

            const orbital_frontier_dist_u = Math.max(0, reach_u - orbit_u);
            const orbital_frontier_scale = compute_frontier_scale(
              orbital_frontier_dist_u,
              transition.orbital_frontier_amount,
              transition.orbital_frontier_width_u,
              transition.orbital_frontier_bias
            );

            const final_scale = base_pscale_px * orbital_frontier_scale * phase_frontier_scale;
            const min_diameter_px =
              config.point_style.min_diameter_px ?? config.point_style.min_rect_px ?? 0.9;
            const diameter_px = Math.max(min_diameter_px, final_scale);

            points[point_index] = {
              center_x_px,
              center_y_px,
              radius,
              target_angle,
              orbit_id,
              speed_rad_per_sec: radians(speed_deg_per_sec),
              birth_sec,
              visible_sec,
              capture_start_sec: point_capture_start_sec,
              diameter_px,
              radius_px: diameter_px * 0.5
            };

            orbit_rank_counts[orbit_id] += 1;
            point_index += 1;
          }
        }

        state.points = points;
        state.spokes = spokes;
      }

      function compute_mascot_fade_amount(playback_time_sec) {
        if (!config.mascot_fade.enabled) {
          return 1;
        }

        return smoothstep(
          0,
          Math.max(0.0001, config.mascot_fade.duration_sec),
          playback_time_sec
        );
      }

      function compute_blink_curve(blink_u) {
        const close_frac = clamp(config.blink.close_frac, 0.05, 0.9);
        const hold_end_frac = clamp(close_frac + config.blink.hold_closed_frac, close_frac, 0.98);

        if (blink_u < close_frac) {
          return smoothstep(0, close_frac, blink_u);
        }

        if (blink_u < hold_end_frac) {
          return 1;
        }

        return 1 - smoothstep(hold_end_frac, 1, blink_u);
      }

      function compute_manual_sneeze_amount(now_ms) {
        if (!state.manual_sneeze_start_ms || !config.sneeze.enabled || !config.blink.enabled) {
          return 0;
        }

        const elapsed_sec = Math.max(0, (now_ms - state.manual_sneeze_start_ms) / 1000);
        const duration_sec = Math.max(0.0001, config.blink.duration_sec);

        if (elapsed_sec >= duration_sec) {
          state.manual_sneeze_start_ms = 0;
          return 0;
        }

        return compute_blink_curve(clamp(elapsed_sec / duration_sec, 0, 1));
      }

      function is_manual_sneeze_active(now_ms) {
        if (!state.manual_sneeze_start_ms || !config.sneeze.enabled || !config.blink.enabled) {
          return false;
        }

        return (now_ms - state.manual_sneeze_start_ms) < Math.max(0.0001, config.blink.duration_sec) * 1000;
      }

      function compute_blink_amount(playback_time_sec, now_ms) {
        let timeline_blink = 0;

        if (
          config.blink.enabled &&
          playback_time_sec >= state.blink_start_sec &&
          playback_time_sec <= state.blink_end_sec
        ) {
          const blink_u = clamp(
            (playback_time_sec - state.blink_start_sec) / Math.max(0.0001, config.blink.duration_sec),
            0,
            1
          );
          timeline_blink = compute_blink_curve(blink_u);
        }

        return Math.max(timeline_blink, compute_manual_sneeze_amount(now_ms));
      }

      function compute_head_turn_deg(playback_time_sec) {
        if (!config.head_turn.enabled) {
          return 0;
        }

        const duration_sec = Math.max(0.0001, config.head_turn.duration_sec);
        const local_time_sec = playback_time_sec;

        if (local_time_sec <= 0 || local_time_sec >= duration_sec) {
          return 0;
        }

        const turn_u = clamp(local_time_sec / duration_sec, 0, 1);
        const peak_frac = clamp(config.head_turn.peak_frac, 0.05, 0.8);
        const overshoot_frac = clamp(config.head_turn.overshoot_frac, peak_frac, 0.98);

        if (turn_u < peak_frac) {
          return lerp(0, config.head_turn.peak_angle_deg, smoothstep(0, peak_frac, turn_u));
        }

        if (turn_u < overshoot_frac) {
          return lerp(
            config.head_turn.peak_angle_deg,
            config.head_turn.overshoot_angle_deg,
            smoothstep(peak_frac, overshoot_frac, turn_u)
          );
        }

        return lerp(
          config.head_turn.overshoot_angle_deg,
          0,
          smoothstep(overshoot_frac, 1, turn_u)
        );
      }

      function update_mascot_animation(playback_time_sec, force_final, now_ms) {
        if (!state.eye_nodes.length) {
          return;
        }

        const fade_amount = force_final ? 1 : compute_mascot_fade_amount(playback_time_sec);
        const blink_amount = force_final ? 0 : compute_blink_amount(playback_time_sec, now_ms);
        const head_turn_deg = force_final ? 0 : compute_head_turn_deg(playback_time_sec);
        const eye_scale_y = force_final ? 1 : lerp(1, clamp(config.blink.eye_scale_y_closed, 0.02, 1), blink_amount);

        for (let eye_index = 0; eye_index < state.eye_nodes.length; eye_index += 1) {
          const eye = state.eye_nodes[eye_index];
          eye.node.setAttribute(
            "transform",
            `translate(${eye.cx} ${eye.cy}) scale(1 ${eye_scale_y}) translate(${-eye.cx} ${-eye.cy})`
          );
        }

        mascot.style.opacity = String(config.mascot.opacity * fade_amount);
        mascot.style.transform = `rotate(${head_turn_deg}deg)`;

        if (state.nose_node) {
          const nose_bob_px = config.sneeze.enabled ? config.sneeze.nose_bob_up_px * blink_amount : 0;
          state.nose_node.setAttribute("transform", `translate(0 ${-nose_bob_px})`);
        }
      }

      function resize_canvas() {
        const stage_size_px = STAGE_SIZE_PX;
        const dpr = Math.min(window.devicePixelRatio || 1, config.performance.max_device_pixel_ratio);

        canvas.width = Math.round(stage_size_px * dpr);
        canvas.height = Math.round(stage_size_px * dpr);

        state.dpr = dpr;
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
        context.imageSmoothingEnabled = false;

        apply_overlay_styles();
        build_scene_data();
        render_current_frame(performance.now(), true);
      }

      function draw_spoke_lines() {
        if (!config.spoke_lines.enabled || state.spokes.length === 0) {
          return;
        }

        context.save();
        context.globalAlpha = 1;
        context.strokeStyle = config.spoke_lines.color;
        context.lineWidth = config.spoke_lines.width_px;
        context.beginPath();

        for (let spoke_index = 0; spoke_index < state.spokes.length; spoke_index += 1) {
          const spoke = state.spokes[spoke_index];
          const x0 = config.composition.center_x_px + Math.cos(spoke.angle) * spoke.start_radius;
          const y0 = config.composition.center_y_px + Math.sin(spoke.angle) * spoke.start_radius;
          const x1 = config.composition.center_x_px + Math.cos(spoke.angle) * spoke.end_radius;
          const y1 = config.composition.center_y_px + Math.sin(spoke.angle) * spoke.end_radius;
          context.moveTo(x0, y0);
          context.lineTo(x1, y1);
        }

        context.stroke();
        context.restore();
      }

      function draw_points(time_sec, force_final) {
        if (state.points.length === 0) {
          return;
        }

        context.save();
        context.fillStyle = config.point_style.color;
        const alpha_ramp_duration_sec = Math.max(0, config.transition_wrangle.alpha_ramp_duration_sec || 0);

        for (let point_index = 0; point_index < state.points.length; point_index += 1) {
          const point = state.points[point_index];

          if (!force_final && time_sec < point.birth_sec) {
            continue;
          }

          if (
            !force_final &&
            config.transition_wrangle.hide_invisible_by_pscale &&
            time_sec < point.visible_sec
          ) {
            continue;
          }

          let angle = point.target_angle;

          if (!force_final) {
            const live_age_sec = Math.max(0, time_sec - point.birth_sec);
            const live_angle = state.spawn_angle_rad - point.speed_rad_per_sec * live_age_sec;

            // Capture blends angularly from the live orbit into the target angle, never across the circle.
            const capture_duration_sec = Math.max(
              0.0001,
              state.dot_end_sec - point.capture_start_sec
            );
            const raw_capture_u = clamp(
              (time_sec - point.capture_start_sec) / capture_duration_sec,
              0,
              1
            );
            const capture_u = raw_capture_u * raw_capture_u * (3 - 2 * raw_capture_u);
            const delta_angle = wrap_positive(live_angle - point.target_angle, TAU);

            angle = live_angle - delta_angle * capture_u;
          }

          const point_x = point.center_x_px + Math.cos(angle) * point.radius;
          const point_y = point.center_y_px + Math.sin(angle) * point.radius;

          let point_alpha = config.point_style.alpha;
          if (!force_final && alpha_ramp_duration_sec > 0) {
            const alpha_start_sec = Math.max(point.birth_sec, point.visible_sec);
            const alpha_u = smoothstep(
              alpha_start_sec,
              alpha_start_sec + alpha_ramp_duration_sec,
              time_sec
            );
            point_alpha *= alpha_u;
          }

          if (point_alpha <= 0) {
            continue;
          }

          context.globalAlpha = point_alpha;
          context.beginPath();
          context.moveTo(point_x + point.radius_px, point_y);
          context.arc(point_x, point_y, point.radius_px, 0, TAU);
          context.fill();
        }

        context.restore();
      }

      function render_scene(time_sec, options = {}) {
        const force_final = Boolean(options.force_final);

        context.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        context.globalAlpha = 1;
        context.fillStyle = STAGE_BACKGROUND_COLOR;
        context.fillRect(0, 0, STAGE_SIZE_PX, STAGE_SIZE_PX);

        draw_spoke_lines();
        draw_points(time_sec, force_final);
      }

      function render_current_frame(now_ms = performance.now(), skip_schedule) {
        const manual_sneeze_active = is_manual_sneeze_active(now_ms);
        const elapsed_sec = Math.max(0, (now_ms - state.animation_start_ms) / 1000);
        const playback_time_sec = clamp(elapsed_sec, 0, state.playback_end_sec);
        const dot_time_sec = Math.min(playback_time_sec, state.dot_end_sec);
        const is_dot_animation_complete = playback_time_sec >= state.dot_end_sec;
        const is_playback_complete = playback_time_sec >= state.playback_end_sec;

        render_scene(dot_time_sec, { force_final: is_dot_animation_complete });
        update_mascot_animation(playback_time_sec, is_playback_complete && !manual_sneeze_active, now_ms);

        if (!skip_schedule && !(is_playback_complete && !manual_sneeze_active)) {
          state.animation_frame_id = requestAnimationFrame((frame_now_ms) => {
            render_current_frame(frame_now_ms, false);
          });
        } else if (!skip_schedule) {
          stop_animation();
        }
      }

      function stop_animation() {
        if (state.animation_frame_id) {
          cancelAnimationFrame(state.animation_frame_id);
          state.animation_frame_id = 0;
        }
      }

      function start_animation() {
        stop_animation();
        state.manual_sneeze_start_ms = 0;

        state.animation_start_ms = performance.now();
        state.animation_frame_id = requestAnimationFrame((frame_now_ms) => {
          render_current_frame(frame_now_ms, false);
        });
      }

      function trigger_manual_sneeze() {
        if (!config.interactivity.sneeze_on_mascot_click) {
          return;
        }

        state.manual_sneeze_start_ms = performance.now();
        if (!state.animation_frame_id) {
          state.animation_frame_id = requestAnimationFrame((frame_now_ms) => {
            render_current_frame(frame_now_ms, false);
          });
        }
      }

      function handle_stage_click(event) {
        if (is_mascot_hit(event.clientX, event.clientY)) {
          trigger_manual_sneeze();
          return;
        }

        if (config.interactivity.replay_on_stage_click) {
          start_animation();
        }
      }

      function attach_ui_events() {
        replay_button.addEventListener("click", () => {
          start_animation();
        });

        stage.addEventListener("click", handle_stage_click);

        if (!is_local_editor) {
          return;
        }

        drawer_toggle_button.addEventListener("click", () => {
          toggle_drawer();
        });

        drawer_backdrop.addEventListener("click", () => {
          set_drawer_open(false);
        });

        drawer_close_button.addEventListener("click", () => {
          set_drawer_open(false);
        });

        reset_button.addEventListener("click", () => {
          void reset_to_defaults();
        });

        preset_save_button.addEventListener("click", () => {
          save_new_preset();
        });

        preset_overwrite_button.addEventListener("click", () => {
          overwrite_active_preset();
        });

        preset_delete_button.addEventListener("click", () => {
          delete_active_preset();
        });

        preset_export_button.addEventListener("click", () => {
          export_current_preset();
        });

        preset_import_input.addEventListener("change", (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) {
            return;
          }

          void import_presets_from_file(file)
            .catch((error) => {
              console.error(error);
              set_preset_meta(`Import failed: ${error.message}`, true);
            })
            .finally(() => {
              preset_import_input.value = "";
            });
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            set_drawer_open(false);
          }
        });
      }

      async function init() {
        if (is_local_editor) {
          load_presets_from_storage();
          if (state.active_preset_id) {
            const active_preset = state.presets.find((preset) => preset.id === state.active_preset_id);
            if (active_preset) {
              replace_config(active_preset.config);
              preset_name_input.value = active_preset.name;
            }
          } else {
            preset_name_input.value = get_next_preset_name();
          }

          build_config_editor();
          sync_editor_values();
          render_preset_tabs();
          set_drawer_open(false);
        } else {
          drawer_toggle_button.hidden = true;
          drawer_backdrop.hidden = true;
          control_panel.hidden = true;
          reset_button.hidden = true;
        }

        attach_ui_events();
        await refresh_scene({ reload_mascot: true });
        if (is_local_editor) {
          set_preset_meta("Presets are stored in this browser. Save New adds another preset tab.", false);
        }

        const resize_observer = new ResizeObserver(() => {
          apply_stage_styles();
          resize_canvas();
        });

        resize_observer.observe(stage);
      }

      init().catch((error) => {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
